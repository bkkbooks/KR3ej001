body:
  text: 卷之一形氣發微論大哉醫乎其來遠矣粵自混沌既判洪荒始分太陽之輕清者以氣而上浮者為天太陰之重濁者以形而下凝者為地天確然而位乎上地煥然而位乎下於是陽之精者為日東升而西墜陰之精者為月夜見而晝陰兩儀立矣二曜行焉於是玄氣凝空水始生也赤氣炫空火始生也蒼氣浮空木始生也素氣橫空金始生也黃氣際空土始生也五行備萬物生三才之道著矣是以人之生也稟天地之陰陽假父母之精血交感凝結以為胞胎也乾道成男坤道成女始自襁褓以至齠齡逮其成童與夫壯年豈易然哉故一月之原有白露之稱三月之胚有干桃花之譬及其三月則先生右腎而為男陰包陽也先生左腎而為女陽包陰也其次腎生脾脾生肝肝生肺肺生心以生其勝己者腎屬水故五臟由是為陰其次心生小腸小腸生大腸大腸生膽膽生胃胃生膀胱膀胱生三焦以生其己勝也小腸屬火六腑由是為陽其次三焦生八脈八脈生十二經十二經生十二絡十二絡生一百八十絲絡一百八十絲絡生一百八十纏絡一百八十纏絡生三萬四千經絡三萬四千經絡生三百六十五骨節生三百六十五大穴三百六十五大穴生八萬四千毛竅則耳目口鼻四肢百骸之身皆備矣所謂四月形像具五月筋骨成六月毛髮生七月則遊其魂兒能動其左手八月遊其魄兒能動其右手九月三轉身十月滿足母子分其中有延月生者必生貴子不足日月生者必生貧賤之人誕生之後有變蒸之熱長其精神壯其筋骨生其意志變蒸已畢一歲期焉齒生髮長神志有異於前也故曰齒者腎之餘也爪者筋之餘也神者氣之餘也籲人身之難得也如此哉方其幼也有如水面之泡草頭之露氣血未定易寒易熱腸胃軟脆易飢易飽為母者調攝不得其宜必不免吐瀉驚疳之病矣及其長也嗜欲既開不能修養是以六氣逆侵於其外七情交戰於其中百憂纍其心萬事勞其神一融之氣安能無病焉小兒之瘡疹大人之傷寒尤其甚也是故聖人不治已病治未病不治已亂治未亂大病已成而後藥之亂已成而後治之亦猶渴而穿井鬥而鑄兵不亦晚乎原病論夫小兒者幼科也初生曰嬰兒三歲曰小兒十歲曰童子兒有大小之不同病有淺深之各異觀形察色之殊望聞問切之間若能詳究於斯可竭神聖工巧者矣蓋望者鑑貌辨其色也假如面部左腮屬肝右腮屬肺額屬心鼻屬脾顴屬腎肝病則面青肺病則面白心病則面赤脾病則面黃腎病則面黑是乃望而知之也聞者聽聲知其證也假如肝病則聲悲肺病則聲促心病則聲雄脾病則聲緩腎病則聲沉此屬於臟又大腸病則聲長小腸病則聲短胃病則聲速膽病則聲清膀胱病則聲微此屬於腑是乃聞而知之也問者問病究其原也假如好食酸則肝病好食辛則肺病好食苦則心病好食甘則脾病好食鹹則腎病好食熱則內寒好食冷則內熱是乃問而知之也切者切脈察其病也假如小兒三歲以下有病須看男左女右手虎口三關從第二指側第一節名風關二節名氣關三節名命關辨其紋色紫者屬熱紅者屬寒青者屬風白者疳病黑者中惡黃者脾之困也色見紅者可治色黑則危矣若見於風關為輕氣關為重過於命關則難治矣至三歲以上乃以一指按寸關尺三部常以沉實七至為率添則為熱減則為寒浮洪風盛數則多驚沉遲為虛沉實為積是乃切而知之也大抵小兒之病大半胎毒而小半於傷食也其外感風寒之疾十一而已蓋小兒之在胎也母飢亦飢母飽亦飽辛辣適口胎氣隨熱情欲無節或喜怒不常皆能令其子受患其為母者胎前既不能謹節産後尤不能調護是以唯務姑息不能防微杜漸或未滿百晬而遂與酸鹹之味或未及周歲而輒與肥甘之物百病由是而生焉且小兒脾胃本自嬌嫩易於傷積乳食傷胃則為嘔吐乳食傷脾則為泄瀉吐瀉既久則變緩驚或為肝病食乳停積則生濕痰痰則生火痰火變作則為急驚或成喉痹痰火結滯或成痛吊或為喘嗽又如胎寒者稟受有病也臍風撮口者胎元有病也鵝口口瘡者胃中有濕熱也重舌木舌者脾經有實火也走馬牙疳者氣虛實熱也愛吃泥土者脾臟生疳也胎驚夜啼者邪熱乘心也變蒸發熱者胎毒將散也丹毒者火行於外也蘊熱者火積於中也中惡者外邪乘也睡驚者內火動也喉痹者熱毒也眼痛者火盛也膿耳者腎氣上衝也鼻寒者風邪在胃也頭痛者熱毒攻也臍痛者風濕中也尾骨痛者陰虛痰也諸蟲痛者胃氣腐也陰腫疝氣者寒所郁也盤腸氣者冷所搏也脫肛者大腸虛滑也遺溺者膀胱冷弱也尿濁者濕滯脾胃也便血者熱傳心肺也下淋者膀胱鬱熱也吐血者榮衛氣逆也小便不通者有陰有陽也大便閉結者有虛有實也解顱鶴膝者胎元不全也行遲發逆者氣血不充也龜胸者肺熱脹滿也龜背者邪風入脊也語遲者邪乘心也齒遲者腎不足也瘧者膈上痰結也痢者腹中食積也咳嗽者肺傷風也喘急者痰氣盛也心痛者蟲所齧也腹痛者食所傷也內傷發熱則口苦舌乾也外感發熱則鼻塞聲重也腹脹者脾胃虛弱也水腫者土虛火旺也黃疸者脾胃濕熱也斑疹者陰陽毒氣也自汗者氣虛也積者有常所有形之血也聚者無定位無形之氣也胃者主納受脾者主運化脾胃壯實四肢安寧脾胃虛弱百病蜂起故調理脾胃者醫中之王道也節戒飲食者卻病之良方也驚疳積熱者小兒之常病也望聞問切醫家之大法也若夫療病用藥如箭中鵠心則又可以心悟而不可以言傳也孟子曰梓匠輪輿能與人規矩不能使人巧斯言得之矣入門審候歌觀形察色辨因由陰弱陽強法硬柔若是傷寒雙足冷要知有熱肚皮求鼻冷便知是瘡疹耳冷應知風熱證渾身全熱是風寒上熱下冷傷食病觀面部五臟形歌心經有冷目無光面赤須知熱病當赤在山根驚四足積看虛空起陰陽肝經有冷麵微青有熱肩胞赤亦臨髮際白言驚風入食倉黃是積果深脾冷應知面色黃三陽有白熱為殃青居髮際生驚候唇口皆黃是積傷肺經面白冷為由熱赤人中及嘴頭青在山根驚四足熱居髮際積為仇面黑應知腎腸寒食倉紅是熱須看風門黃可言風入面目微沉於兩顴觀面部五色歌面赤為風熱面青驚可詳心肝形見此脈症辨溫涼脾怯黃疳積虛寒㿠白光若逢生黑氣腎敗命虛亡三關脈紋變見歌魚刺驚風證莫疑氣關疳病熱相隨命關見此為難治此是肝家傳到脾初節懸針生瀉利氣關脈熱更堪疑三關直透黃泉近此症須知是慢脾水字生驚肺受風氣關鳴嗽積痰攻醫人仔細辨虛實出命驚疳火症凶乙字驚風肝肺隨氣關形見發無時此形若直命關上不久相將作慢脾曲蟲為候主生疳若見氣關積穢肝直到命關為不治須知心臟已傳肝雙環肝臟受疳深入胃氣關吐逆臨若是命關為死候枉教醫人免苦勞費心流珠形見死來侵面上如斯亦不深縱有神丹不可救醫人仔細更叮嚀小兒正訣指南賦小兒方術號曰啞科口不能言脈無所視唯形色以為憑竭心思而施治故善養子者似養龍以調護不善養子者如舐犢之愛惜愛之愈深害之愈切乍頭溫而足冷忽多啼而亂叫差之毫釐失之千里此無脈之風門以補造化之不及腸胃脆薄兮飲食易傷筋骨柔弱兮風寒易襲父母何知看承太重重綿厚褥反助陽以耗陰流啜放飯總敗脾而損胃聞異聲見異物失以提防深其居簡其出固於周密未期而行立兮喜其長成無事而喜笑兮謂其聰明一旦病生而人心戚不信醫而信巫不求藥而求鬼此人事之不修謂天命之如此欲觀氣色先分部位左頰青龍屬肝右頰白虎屬肺天庭高而離陽心火地閣低而坎陰腎水鼻在中而脾土為通氣觀乎色之所見知乎病之所起又況脾應乎唇肺通於鼻舌乃心苗淚為肝液胃流注於雙頤腎開竅於兩耳爪則筋之餘而脾為之運發則血之餘而腎為之主脾司手足腎運齒牙苟五臟之或衰即所屬之先斃凡觀乎外必知其內紅氣現而熱蒸青色露而驚悸如煤之黑兮中惡之因似橘之黃兮脾虛之謂白乃疳勞紫為熱極青遮口角難醫黑掩太陽不治年壽赤光多生膿血山根青黑頻見災危雖察色以知烏豈按圖而索驥朱雀貫於雙瞳火入水鄉青龍達於四白肝乘肺位瀉痢而帶傷須防咳嗽而拖藍可忌疼痛方殷常面青而唇撮驚風欲發先顏赤而目直火光焰焰外感風寒金氣浮浮中藏癖積乍黃乍白兮疳熱連綿又赤又青兮風邪緊急察之若精治之得理鴉聲魚口枉費精神肉折皮乾空勞心力氣色改移形容變易氣乏兮囟門成坑血衰兮頭毛作穗眼生眵淚兮肝風眛目口流痰涎兮脾冷滯積面目虛浮定腹脹而氣喘眉毛頻蹙則肚痛以多啼蛔出兮脾胃將敗䘌瘡兮肛藏先虧苟瞑眩而弗瘳縱神仙而何益手如數物肝風將發面若塗朱心火以熾坐臥欲冷兮煩熱之攻伸縮就暖兮風寒之畏肚大腳細脾欲困而成疳眼瞪口張熱已危而必斃弄舌脾熱解顱腎憊重舌木舌虛熱積於心脾哽氣喘氣實火浮於脾肺齦宣臭露必是牙疳哺露丁奚多緣食積唇乾作渴腸鳴自利夜啼分為四症變蒸周於一年心熱欲言而不能脾虛無時而好睡病後失音腎怯咳嗽失音肺病肚痛而清水流出者蟲腹痛而大便酸穢者積口頻缺而肝虛舌長伸而火熾龜背兮腎風入於骨髓龜胸兮肺火脹於胸膈鼻乾黑燥火盛金衰肚大青筋木強土壞丹瘤瘡疥皆胎毒之流連吐瀉瘧痢乃食積之沾滯不能吮乳者熱在心脾常欲俯臥者熱蒸腸胃喜視燈火煩熱在心愛吃泥土疳熱在脾腹痛寒侵口瘡熱積臍風忌一臘火丹畏一周驚自熱來癇因痰至吐瀉而精神耗散則危瘧痢而飲食減少心瘁驚本心生風因肝致搐分左右症有順逆藥分補瀉病有虛實急驚者由於積熱之深涼瀉便宜慢驚者得於大病之後溫補為貴頭搖目竄而氣喘兮上工莫醫口噤鼻張而足涼兮靈丹何濟閉目兮無魂狂叫兮多祟不知吞吐者死反加悶亂者危既明症候須知調理胎毒兮甘草黃連食積兮白朮枳殼急掠搐掣以導赤瀉青慢驚瘛瘲以補中益氣集聖治疳備急去積抱龍丸化痰鎮驚胃苓丸補中開胃夜啼兮退熱涼心晡熱兮養血升提理中主瀉香連止痢積熱不除涼驚丸大有神功沉寒難瘳養脾丸最為祕密痰火攻兮三黃丸水穀下兮一粒金柴芩治瘧月蟬消痞潮熱金花咳嗽玉液瘡疥胡麻丹瘤涼膈吐瀉而渴兮白朮可投煩熱而渴兮益元為最丹疹兮消毒腹痛兮脾積鼻衄咳血茅花木舌重舌針刺口瘡不愈者洗心腹脹不食者平胃五拗治啼四苓利水退黃消腫胃苓加減以堪行破積安蟲集聖從容而可治大抵小兒易為虛實調理但取其平補瀉無過其劑尤忌巴牛勿多金石辛熱走氣以耗陰苦寒敗陽而損胃如逢食積解之不可或遲若過虛羸補之尤為至急才少俄延便成勞斃胎疾小兒自初生至周歲有疾者皆為胎疾氣陽也血陰也人之有生受氣於父陽之變也成形於母陰之合也陰陽變合而成其身身之中形藏四頭面一也耳目口鼻二也手足三也皮肉筋骨四也神藏五心藏神肝藏魂脾藏意肺藏魄腎藏志是也凡九藏者皆父母一體而分者也形拘於一偏而不能相通者陰之靜也神隨感而動者陽之動也兒之初生只是一塊血肉耳雖有形而無所用雖有五臟而無其神猶空藏也至於變蒸之後皮肉筋骨以漸而堅聲色臭味以漸而加志意智慧以漸而發知覺運動而始成童此天地生物之心至誠不息也有因父母稟受所生者胎弱胎毒是也胎弱者稟受於氣之不足也子於父母一體而分如受肺之氣為毛皮肺氣不足則皮脆薄怯寒毛髮不生受心之氣為血脈心氣不足則血不華色面無光彩受脾之氣為肉脾氣不足則肌肉不生手足如削受肝之氣為筋肝氣不足則筋不束骨機關不利受腎之氣為骨腎氣不足則骨軟此胎稟之病當隨其藏氣求之肝腎心氣不足宜六味地黃丸主之脾肺不足者宜參苓白朮丸主之子之羸弱皆父母精血之弱也所謂父強母弱生女必羸父弱母強生男必弱者是也故兒有頭破顱解神慢氣少項軟頭傾手足痿弱齒生不齊發生不黑行走坐立要人扶掖皆胎稟不足也並宜六味地黃丸主之胎毒者精血中之火毒即命門相火之毒命門者男子以藏精女子以系胞也觀東垣紅瘤之論丹溪胎毒之論治法可見矣古方有解毒之方如黃連甘草法又有育嬰解毒延齡丹皆良方也豫新立一方用丹溪三補丸方苓連蘖半生用半酒炒甘草半生半炙各等分為末雪水丸麻子大硃砂雄黃為衣名曰生熟解毒丸小兒日與食之佳有胎毒所生者如蟲疥流丹浸淫濕瘡癰癤結核重舌木舌鵝口口瘡與夫胎熱胎寒胎黃胎驚之類兒之初生有病多屬胎毒如一臘之臍風百晬之痰嗽難治恰半歲而真搐者凶未一歲而流丹者死是也況初生之兒腸胃薄小血氣未充藥石則難進也榮衛微弱筋脈未實針灸則難用也業幼科者慎毋忽諸一小兒丹發於臉眼中紅腫手不可近三日死一小兒生下一月後遍身蟲疥浸淫濕爛其皮如脫日夜啼忽一日其瘡盡隱發搐而死或問胎稟不足之證得於父母有生之初如何醫得豫曰諸器破損者尚可補之豈謂胎弱者不可補之乎貴得其要也夫男女之生受氣於父成形於母故父母強者生子亦強父母弱者生子亦弱所以肥瘦長短大小妍媸皆肖父母也兒受父母之精血以生凡五臟不足者古人用地黃丸主之或曰五臟不足而專補腎何也曰太極初分天一生水精血妙合先生兩腎腎者五臟之根本經曰植木者必培其根此之謂也或問胎毒之說豫曰先賢論之詳矣蓋人生而靜天之性也感物而動胎之欲也欲者火也故思慮之妄火生於心恚怒之發火生於肝悲哀之過火生於肺酒肉之饜火生於脾淫佚之縱火起於腎五欲之火隱於母血之中即是毒也男女交媾精氣凝結毒亦附焉此胎毒之原也如謂兒在母腹飢則食母之血渴則飲母之血及其破胎而出口有餘血拭之不淨咽下腹中是謂胎毒斯言也一人倡之百人和之未有辨之者此書之不可盡信也胚胎資始父精所生身體資生母血所養是水珠露花男女漸分毫髮筋骨形象斯具誕彌厥月氣足形全乃破胎而生矣初在母腹之時如鳥之雛伏於卵殼之中何所飲食也口內之血乃母臨産惡露漬入口中未必是母腹中所銜之血也既云咽下腹中則入於大腸界從大便出矣安得留在命門待時而發耶詳見痘疹心要一兒頸細其父嘗問於豫可養何如豫曰頸者頭之莖也頸細則不能任元在父母調養之八歲後再議至五歲死一兒解顱未一歲認字念書父母甚愛之豫曰此兒胎稟不足腎虛顱解真陽弱矣聰慧早發真陽泄矣恐遺父母憂未一歲而發搐死一兒周歲後多笑豫曰此兒難養父問其故豫曰腎為水心為火水陰火陽陰常不足陽常有餘笑者火之聲也水不勝火故知難養父曰諸兒笑者皆不可養乎豫曰待人引之而笑者此有情也見人自笑者此無情也後以痘瘡而死一兒頭縫四破皮光而急兩眼甚小豫曰腦者髓之海也腎主骨髓中有伏火故髓熱而頭破額顱大而眼楞小也宜服地黃丸父母不信至十四歲而死一兒發搐五日不醒藥石難入豫針其三里合谷人中而醒父母喜曰吾兒未出痘疹願結拜為父乞調養之豫曰曩用針時針下無氣此稟賦不足也如調理數年後出痘疹可保無事若在近年不敢許次年果以痘疹死一兒四歲出痘時頸軟頭傾不能自舉豫謂其父曰此兒胎稟不足瘡毒正發壯火食氣亟補元氣使痘易發易壓幸而保全再補其陰不然恐難出二八數也乃大作調元湯連服之獲安有三因所生者衣太厚則熱太薄則冷冷熱之傷此外因也乳多則飽乳少則飢飢飽之傷此內因也客忤中惡墜僕折傷此不內不外因也若順乎天時適其寒溫則不傷冷傷熱矣慎擇乳母節其飲食則不傷飢飽調護之久愛惜之深必無縱弛之失也慎勿使庸醫妄投湯藥誤兒性命臍風治未病臍在兩腎之間任沖督脈之所繫也兒之初生斷臍護臍不可不慎故斷臍之時隔衣咬斷者上也以火燎而斷之次也以剪斷之以火烙之又其次也護臍之法臍既斷矣用軟布纏裹待乾自落勿使犯去也三朝洗兒當護其臍勿使水漬入也臍落之後當換抱裙勿使尿濕浸及臍中也如此調護則無臍風之病所謂上工治未病十得十全也治初病兒生旬日之後臍風為惡病也凡覺小兒噴嚏多啼此臍風欲發之候急抱小兒嚮明皛處審視口中上齶有泡如珠如米或聚或散此病根也其色白者初起也黃者久也可用銀挖耳輕手刮出煎甘草薄荷湯拭洗之預取桑白皮汁塗之自此日日視之有則去之不可因循以貽後禍所謂中工治初病十全六七也治已病不知保護於未病之先不知調護於初病之日其泡子落入腹中變為三證一曰撮口二曰噤風三曰鎖肚證雖不同皆臍風也撮口證兒多啼口頻撮者此臍腹痛也可用雄黃解毒丸加乳香沒藥各五分丸如黍米大每服五丸竹瀝生薑自然汁送下利去惡涎良外用蘄艾炒熟杵爛護其臍頻換使暖溫之氣不絶也不乳者不治噤風證牙關緊急不能吮乳啼聲不出發搐者不治鎖肚證臍突青腫肚腹脹大青筋浮露大便澀不通者不治或問臍風三證古人有方何謂不治豫曰一臘之內謂初生八日草木方萌稍有觸犯即便折傷經曰根於中者命曰神機神去則機息故噤風者乳食不得入則機廢於上矣鎖肚者便溺不得通則機廢於下矣所謂出入廢則神機化滅者是也神出機息雖有神丹不可為也豈蜈蚣蠶蠍諸毒藥之可治耶一小兒生後三日啼哭不乳豫視其證非臍風乃臍腹痛也取蘄艾杵爛火上烘熱掩其臍上以帛勒之須臾吮乳而不啼矣一小兒生八日噴嚏多啼請豫視豫曰此臍風也視其上齶果有泡色變黃矣乃取銀挖耳刮去之其父慘然愛惜之心見於形色故去之未盡也有老嫗聞之急使婢女告其父當急去之其言迫切父益懼自取銀挖耳刮之不惜也遣人告豫豫回書曰旬日後當發驚風後果病迎豫治之許厚報且泣曰豫三十六歲得此一子也豫曰無傷投以至聖保命丹而愈變蒸變蒸非病也乃兒長生之次第也兒生之後凡三十二日一變變則發熱昏睡不乳似病非病也恐人不知誤疑為熱而汗下之誅罰無過名曰大惑或誤以變蒸得於胎病中者或曰兒之生也初無變蒸既生之後當以三十二日一變至於三百八十四日之後又無變者何也曰初無變蒸者藏諸用陰之闔也中有變者顯諸仁陽之鬥也終無變者陰陽闔闢之機成故不復蒸也故兒之初生語其皮肉則未實也語其筋骨則未堅也語其腸胃則穀氣未充也語其神智則未發開也只是一塊血肉耳至於三百八十四日然後臟腑氣足經絡脈滿穀肉果菜以漸而食方成人也或曰變蒸之日必以三十二日者何也曰易傳云甡之為易易者變易也不變不易不足以見天地生物之心人有五臟六腑以配手足十二經絡腑屬陽以配陽卦三十二臟屬陰以配陰卦三十二取其一臟一腑各以三十二日一小變六十四日一大變陽卦之爻一百九十二合歲並閏月凡三百八十四爻所以變蒸一期之日三百八十四以應六十四卦爻之數也或曰三十二日一小變六十四日一大變所生者何物也所生之物亦有說歟曰形既生矣復何生也所生者五臟之知覺運動也故初生三十二日一變生足少陰腎癸水腎之精也六十四日二變生足太陽膀胱壬水而腎與膀胱一臟一腑之氣成矣此天一生水也水之精為瞳子此後始能認人矣九十六日三變生手少陰心丁火一百二十八日四變生手太陽小腸丙火而心與小腸一臟一腑之氣足矣此地二生火也火之精為神此後能嬉笑矣一百六十日五變生足厥陰肝乙木一百九十二日六變生足少陽膽甲木而肝與膽一臟一腑受氣足而神合矣此天三生木也木之精為筋此後能坐矣二百二十四日七變生手太陰肺辛金二百五十六日八變生手陽明大腸庚金而肺與太陽一臟一腑之氣足矣此地四生金也金之精為聲此後始能習人語矣二百八十八日九變生足太陰脾己土三百二十日十變生足陽明胃戊土乃脾胃一臟一腑之氣足矣此天五生土也土之精為肉脾胃主四肢此後能匍匐矣三百五十二日十一變生手厥陰心包絡三百八十四日十二變生手少陽三焦配腎腎主骨髓自此能坐能立能行矣變蒸已足形神俱全矣正如蠶之眠不如是不足成人矣凡一變之過則筋骨手足以漸而堅知覺運動以漸而發日異而月不同曰變者變易也曰蒸者發熱也祖訓云變蒸雖是胎病非胎熱胎毒可比矣此少陰生長之氣發育萬物者兒之強者雖有是病不覺氣弱者始見如變後形體漸長知識漸增反為無病兒也故無治也古方黑子散姑置之可也其間或有未及期而發熱者或有變過熱留而不除者抑有他故須詳察之如昏睡不乳則不須治待其自退變蒸兼證變蒸之時有外感風寒者宜發散惺惺散主之按摩法亦可用也有內傷乳食者宜須消導胃苓丸生之輕則節之可也有被驚嚇及客忤者安神丸至聖保命丹如變蒸而後發病以治病為主慎勿犯其胃氣咳嗽甘草桔梗湯加阿膠吐瀉理中湯加藿香葉驚風琥珀抱龍丸瀉青丸導赤散如受病後而變蒸以養正補脾為主錢氏異功散加對病之藥惺惺散四君子湯加蘇葉加防風湖廣按察司憲長有子九月發熱恐是痘疹差人來取豫往視之非痘是變蒸也公曰何以辨之豫曰以日計之有當變蒸之期以證察之亦無痘疹之症公問痘何證也豫曰痘者五臟之液毒也故五臟各見一證呵缺驚悸心也項急頓悶肝也咳嗽噴嚏肺也吐瀉昏睡脾也身體皆涼腎也今公子無之知非痘乃變蒸將退也次日果安公喜曰汝術甚精贈以白金五兩應付而歸本縣胡正瞿有子二月發熱不乳豫見之雖似變蒸非變蒸時乳母皆肥健必因傷乳發熱也令損之次日熱退而安矣幼疾兒生一歲後至七歲後變蒸已足脈雖難診口則能言病多傷食之證八歲以後有脈可診證與大人同但用劑小耳有因氣動而病生於內者如盤腸內吊蛔蟲癖塊之類有因氣動而病生於外者重舌木舌鵝口口瘡癰疽瘡癬之類有不因氣動而病生內者如傷飲食生冷之類有不因氣動而病生於外者如四時感冒金刃湯火傷之類上四因之病治見各證之下一小兒周歲因初食雞肉太早自此成積日漸羸瘦不思乳食其父以詳告豫豫取藥治之養脾消積丸先服三日後服丁香脾積丸雞肉湯下取下雞肉一片猶未化也再進養脾丸而愈家傳養脾消積丸消宿食去陳積神效白朮一兩陳皮七錢五分蒼朮五錢厚朴薑汁炒五錢枳殼麵炒五錢半夏五錢青皮五錢神麯五錢麥芽五錢山楂五錢炙甘草三錢上為細末蒸餅為丸黍米大每服二三十丸米飲送下育嬰延齡解毒丸能解胎毒初生小兒宜服兒斷臍帶連胞不拘長短剪取新瓦上焙乾每一錢加生甘草末二錢黃連末一錢硃砂飛半錢共和勻生白砂糖調和瓷罐收貯每服一豆許納兒口中以乳送下一日一次藥盡而止五臟諸證此因五臟氣動所生之病乃病生於內者也五臟主病肝經主病肝主風實則目直視呵缺大叫哭項急頓悶虛則咬牙呵缺氣溫則內生氣熱則外生也氣謂口中氣也實則瀉青丸當歸龍薈丸瀉之虛則地黃丸補之瀉青丸治急驚搐搦主肝熱羌活防風當歸川芎山梔仁龍膽草大黃酒浸紙煨各等分上為末蜜丸芡實大每服半丸至一丸煎竹葉湯砂糖化下當歸龍薈丸治腎肝陰虛風熱蘊結發驚悸搐搦躁擾當歸一兩龍膽草一兩黃連五錢黃柏一兩大黃五錢山梔子一兩蘆薈五錢青黛五錢木香一錢麝香五分黃芩一兩上為細末蜜丸麻子大每服五丸至十五丸竹葉湯下地黃丸治小兒胎稟不足腎怯不言解顱兒大不能行又治肝疳白膜遮睛溲血失音身瘦瘡疥熟地黃八兩焙取末山茱萸焙四兩山藥四兩白茯苓三兩牡丹皮二兩澤瀉二兩上為末蜜丸芡實大一歲兒服一丸二歲以上加至三丸空心溫水下肝經兼證諸風搐搦牽引喎斜皆肝之病也宜瀉青丸主之一小兒七月發搐無時昏睡不醒不哭不乳掐之扎之不痛㗜之鼻不嚏灌藥不入豫曰此真搐也不可治矣兼見心證則發熱而搐豫曰肝有風則目連札不搐得心熱則搐肝有熱則目直視不搐得心熱則搐瀉肝瀉青丸瀉心導赤散方見肝心下兼見脾證輕則昏睡不嗜飲食當視其大便何如大便祕者宜蜜導法慎勿下之恐下後脾虛反為篤疾大便潤者宜琥珀抱龍丸主之兼見肺證喘急悶亂痰涎壅塞須從大小便以利之如喘息有聲肩聳胸高喉中痰響者不治宜清寧散主之清寧散驚熱出於心肺須從小便利之桑白皮蜜水炒赤茯苓車前子甜葶藶炒山梔仁各等分炙甘草減半上為末每服半錢薑棗水煎服肝熱則大小便難加煨大黃下一小兒痰壅而發搐氣促而喘豫用礞石滾痰丸桑白皮煎湯研碎調服之喘定痰下搐亦止矣兼見腎證暴喑失音手足強直此從風治輕者地黃丸主之重則為廢疾而不可治矣肝所生病諸風掉眩皆屬肝木脈訣云熱則風生是也急慢驚風急驚風者肝風甚而心火從之木生火從前來為實邪實則瀉之宜用瀉青丸以瀉肝之風導赤散以瀉心之火慢驚風錢氏云脾虛則土瀉生風此脾土敗而肝木乘之肝屬木而脾屬土從所不勝來者為賊邪故慢驚為難也脾虛生風虛則補之東垣用調元湯加白芍藥主之此以黃耆人參補脾之虛白芍藥甘草以瀉肝之實誠千古不傳之祕法也豫加桂在內乃黃耆建中湯木得桂而枯古方治慢驚者如醒脾散觀音散皆良法也可用之醒脾散人參陳皮甘草白朮白茯苓全蠍半夏曲木香各三錢五分白附子四個炒南星一個薑湯泡陳倉米一百粒上為末每服一錢棗三枚姜三片水煎觀音散全蠍十個去毒炒天麻煨防風白芷黃耆甘草白茯苓各二錢五分人參二錢扁豆一錢五分薑汁炒上為末棗湯下或問曰上工治未病急慢驚風何以預治之曰方其熱甚之時腮赤面黑兩目如怒直視不轉者此急驚風之候也宜服河間當歸龍薈丸以瀉肝膽之火則不成急驚風也當吐瀉不止之時見其手足冷睡露睛口鼻氣冷者此慢驚欲成之候也急用參苓白朮散以補脾琥珀抱龍丸去枳殼枳實加黃耆以平肝則慢驚風不能成矣此吾家傳祕法參苓白朮散人參白朮白茯苓山藥扁豆去殼薑汁浸炒各一兩五錢甘草桔梗薏苡仁蓮肉各一兩上為細末棗湯送下琥珀抱龍丸治小兒諸驚四時感冒寒溫風暑瘟疫邪熱躁煩不寧痰嗽氣急及瘡疹欲出發搐並宜服之此豫家傳常用之方真琥珀一兩五錢天竺黃一兩五錢白檀香一兩五錢人參一兩五錢硃砂五錢白茯苓一兩五錢粉草去筋三兩南枳實一兩枳殼麩炒一兩牛膽南星一兩淮山藥一兩金箔大者一百片為衣上各製取末和勻用臘雪溶水如無雪取新汲或長流水杵為丸如芡實大約重五分陰乾每服一丸煎薄荷湯下此方內有補益之藥人皆喜而用之但有枳殼枳實能散滯氣無滯氣者損胸中至高之氣如慢驚風及元氣弱者減此二味用當歸川芎各二兩代之至聖保命丹一名紫金錠子膽星一錢殭蠶一錢白附子一錢全蠍十四枚天麻一錢防風一錢辰砂一錢半水飛麝香一分珍珠五分琥珀三分金箔二十片上碾為末粟米和為丸分為二十錠金箔為衣每一錠薄荷葉煎湯磨服礞石滾痰丸降火墜痰之要藥方見大方脈科涼驚丸諸熱通用此吾家傳之方又名金花丸黃柏黃連黃芩山梔仁各等分硃砂水飛減半一本有龍膽草等分上為細末臘雪水為丸麻子大薄菏湯送下三黃瀉心丸一名三黃五色丸利諸驚熱如神黃連黃芩大黃各等分上為末雪水為丸麻子大溫水送下均分作五分用衣一分硃砂衣一分青黛衣一分雄黃衣一分輕粉衣一分蘆薈衣木通散能瀉肝風降心火最利驚熱山梔仁大黃煨赤茯苓羌活木通甘草以上各等分上為末每服一字紫蘇葉煎湯送下豬膽汁導方定志丸治驚久成癇人參白茯神遠志石菖蒲炒酸棗仁炒柏子仁各一錢半琥珀珍珠膽星鐵花粉各一錢硃砂飛麝香各一字上為末水煮山藥粉為丸黍米大每服十五丸燈心煎湯下更煎豬心與兒食之以助藥力急驚風屬陽病在六腑易治宜用涼瀉慢驚風屬陰病在五臟難治宜用溫補或問病有急慢陰陽者何也曰肝主風木也飄驟急疾莫甚於風心主驚火也暴烈飛揚莫甚於火木火陽也故病在於心肝者謂之急而屬陽脾胃者土也沉重遲滯莫甚於土脾土者至陰之屬也故病在於脾者謂之慢而屬陰肝常有餘有餘則瀉而損之脾常不足不足則補而益之至於心主驚肝主風似宜前論然火資風勢風資火威風火相扇而發搐故不可別論也驚風之病有兼證者有類證者不可不辨也急驚風有三因有外因者如感冒風寒溫濕之氣而發熱者宜即發散之和解之以除其熱可也苟失而不治熱甚發搐此外因之病也宜導赤散瀉青丸主之有內因者如傷飲食發熱者即宜消導之下之如保和丸三黃枳朮丸之類以除其熱可也苟失而不治熱甚發搐此內因之病也當視大小便如何如大便不通先去其宿食宜木香檳榔丸及膽導法大便潤以辰砂五苓散琥珀抱龍丸主之有不內外因者如有驚恐或客忤中惡得之蓋心藏神驚有傷神腎藏志與精恐有傷腎經云隨神往來謂之魂並精出入謂之魄故神傷則魂離精傷則魄散小兒神志怯弱猝有驚恐所以精神潰亂魂魄飛揚氣逆痰聚乃發搐也客忤中惡出其不意大人且驚況小兒乎宜先去其痰辰砂膏主之後安其神琥珀抱龍丸主之有熱者東垣安神丸下痰之藥慎勿用輕粉巴豆之類恐傷元氣損脾胃誤殺小兒錢氏抱龍丸治小兒風痰熱甚昏睡急驚雄黃飛四錢天竺黃四錢膽星八錢硃砂水飛淨四錢麝香三分上為末煮甘草膏為丸芡實大薄荷湯化下辰砂膏以通心氣硃砂飛一錢牙硝二錢五分雄黃飛二錢五分麝香二字金箔十五片銀箔十五片白附子三錢枳殼炒三錢川芎四錢白茯苓四錢人參二錢黃連二錢遠志二錢除前六味另碾後七味共為末和勻蜜丸芡實大每服一丸麥門冬煎湯化下此硃砂膏加減或問熱甚則生痰痰甚則發搐錢氏有利驚丸以下其痰陳氏有芎蠍散以吐其痰皆可用否豫曰藥不執方合宜而可用也兒壯實者吐之下之病則止兒弱怯者不可孟浪反傷元氣大抵痰在咽喉之中壅塞沾滯藥食不能入者則宜吐而去之此在上者越而治之法也宜用殭蠶牙皂炙焦等分研末每服少許以土牛膝根自然汁灌之即吐吐後卻進下痰藥如五色三黃丸礞石滾痰丸辰砂膏皆可用之辰砂膏下痰甚妙飛辰砂三錢硼砂一錢半馬牙硝一錢半玄明粉二錢全蠍去毒一錢珍珠一錢麝香一字上為末和勻用好油單紙包起自然成膏每用一粒許治諸驚薄荷湯下治胎驚乳汁調棗湯下豫初習醫治一兒二歲發搐而死請豫至舉家痛哭乃阻之告其父曰此兒面色未脫手足未冷乃氣結痰壅而悶絶非真死也取艾作小炷灸兩手中衝穴火方及肉而醒大哭父母皆喜遂用家傳治驚方以雄黃解毒丸十五丸利其痰涼驚丸二十五丸去其熱合之薄荷煎湯送下須臾利下黃涎搐止矣豫歸父問用何藥如是速效全具以告父父語母曰吾有子矣一兒發搐痰壅有醫用白餅子下之不退凡三下病益深合目昏睡不哭不乳喉中氣鳴上氣喘促大便時下豫曰五臟氣絶病不可治轉下之過也彼醫曰白餅子錢氏下痰神方也豫曰盡信書則不如無書錢氏小兒皆出於門人附會之說也蓋人之有痰猶木之有津時令大熱草木流津痰自熱生此明驗也痰猶水也附氣自行過顙在山豈水之性哉乃搏激使之也今痰隨火上不知降火而反下之損其胃氣胃氣既敗五臟俱損故目不開者肝絶也昏睡不乳者脾絶也啼聲不出者心絶也喘促痰響者肺絶也便溺遺失者腎絶也果不可治而死邑中有儒醫治病有奇方唯性太執不知通變時有小兒發搐豫謂急驚當用涼瀉導赤散瀉青丸是也彼謂驚風者肝火鬱遏而成也火鬱則發之小續命湯是也人不能決兩從之豫所治者一日而安彼治者死悔不信吾言無及矣一兒發搐先取善推法推之止向後發病益危甚豫曰推法者乃針灸摩按之遺意也經曰無刺大虛人推搐之法壯實者可用之如怯弱者其氣不行推則有汗反傷元氣也其家不信豫言豫曰不死必成癇疾半月後果死一兒發搐因用推法暫退一月後如期復發又推之或一月一發或一月再發豫曰病成癇矣推法者乃發表之意痰聚在心不得出也幸初成癇者尚可治若久則為終身痼疾不可治也因立方用四色斷癇丸黃連五錢飛硃砂二錢五分膽星一錢白甘遂三分為末粟米糊丸兼獖豬心血杵勻丸芡實大每服一丸燈草煎湯化下夜服三次日服一次遂安癸亥二月英山縣大尹前縣吳公一子發搐彼醫以二陳湯薑汁竹瀝治之不退公初來任過羅與全有識承差人請之全往視其外候三關青氣兩頰赤色目常直視指如捻物曰此得之外感未與發散熱入於裡錢氏曰肝有熱則目直視得心熱則發搐又曰兩頰赤而目直視必作驚風小兒肝常有餘又乘木旺之時當與瀉肝若二陳湯陳皮半夏生薑之辛皆助肝之物經曰以辛補之所以無效乃用瀉青丸以瀉肝之有餘導赤散以瀉心之火一服而搐即止公喜謂其下曰所見不同用藥即效真良醫也彼到時吾心有主今果無憂矣全見其胎稟素怯脾胃自弱恐後作搐便成癇矣又作琥珀丸與之常服而安蘄水沙阪徐淑道一子患驚風先求醫張姓者治之數日不效請豫往痰喘正急驚搐頻發豫先治其痰次治其搐以次而定唯身熱猶熾張姓者欲用解毒湯竹葉湯小柴胡湯豫皆不可謂之曰小兒肝嘗有餘脾嘗不足病發於肝風木太旺脾土受傷此乃虛熱勿用寒涼致損中氣也乃用四君子湯加炙黃耆炒黑乾薑一服而安一小兒年五歲夢中驚哭抱其母叫怕此因被驚嚇得之豫制一方用人參麥門冬白茯神黃連酸棗仁柏子仁炙甘草硃砂各等分一半水煎一半入地黃加炙甘草為末山藥粉糊丸黍米大每服二十五丸燈草煎湯下未盡劑而安一小兒周歲發熱而搐以瀉青丸投之不效乃問其發搐之狀其母曰搐過後則好睡以乳與之則飲不與乳則不思乳醒時則戲作貓兒聲見人則笑不發搐便是好了豫曰醫要識證藥要對證怪底前藥之不效也以導赤散服之一劑而安其父問是何故豫曰心臟屬火其聲為笑火生於寅屬虎貓者虎之類也貓聲而笑知非肝病乃心病也故以導赤散瀉其心火而安聞者歎服
