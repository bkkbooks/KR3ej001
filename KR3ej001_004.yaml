body:
  text: 卷之四瘧瘧疾不問新舊並宜服平瘧養脾丸此家傳祕方治有三方初截中和末補初治法初起有外因者不問風寒暑濕之邪並宜香蘇散加紫蘇香附陳皮甘草外加常山檳榔烏梅於發日五更時服得吐為善蓋吐中即有發散之義不復作矣有內因飲食不化積而成痰痰變為瘧宜平胃散加常山烏梅檳榔臨發日五更服或吐或下痰積悉除不復作矣有不內外因者客忤中惡夢寐顛倒成瘧者此邪瘧也宜四聖丸加家傳斬鬼丹主之人身榮衛之氣晝則行陽二十五度夜則行陰二十五度故瘧之晝發者邪在陽分易治宜用前法截之夜發者不可截也宜桂枝湯加當歸生地黃桃仁發出血中之邪自已不已者必須提至陽分然後截也升提宜柴胡四物湯加升麻葛根截宜柴胡湯加常山檳榔烏梅主之中治法邪氣漸強正氣漸衰宜以養正去邪和解為主柴苓湯主之此和解之聖方也服三劑後加常山烏梅以去其邪二補一攻常與調理以瘥為度如有熱多寒少宜用柴胡白虎湯寒多熱少者柴胡桂枝湯主之二劑之後間截藥一劑熱多者用常山知母草果檳榔各一錢寒多者用常山錢半丁香五分烏梅一個為劑各用酒一盞浸一夕發日五更服如神末治法瘧久不退謂之痎瘧老瘧也邪氣未盡正氣已衰專以養正為主使正氣復邪氣自盡也十全大補湯加陳皮半夏柴胡主之食少者去地黃加神麯有瘧母者本方加青皮神麯九肋鱉甲醋服小兒瘧久不退腹中或左或右有塊者此名瘧母即癖也瘧後有此經年不愈常為潮熱其狀似瘧面黃腹大乃其候也宜消去之祖方用月蟾丸今豫立消癖丸小兒久瘧成疳勞者集聖丸主之瘧後浮腫者胃苓丸主之瘧後與泄痢並作者宜柴苓加檳榔烏梅主之蓋小柴胡湯治瘧五苓散治瀉痢檳榔烏梅痢瘧必用之藥也平瘧養脾丸此吾家傳治瘧之神方也人參白朮白茯苓甘草炙當歸川芎陳皮半夏曲蒼朮米泔浸炒厚朴薑汁炒柴胡黃芩豬苓澤瀉草果常山青皮辣桂九肋鱉甲酥炙各等分上一十九味共研末於五月五日及三元八節天月德要安普護福生除開破日修合酒煮曲糊丸麻子大陳米湯下消癖丸專治瘧母食症痰癖五飲成癖並治三稜即魚形者莪朮各醋浸炒陳皮枳殼麩炒厚朴薑汁炒山茱萸使君子夜明砂黃連炒木香乾薑炒各二兩海藻洗淨半兩神麯麥糵半夏曲二錢乾蟾炙九肋鱉甲醋炒各三錢上為末酒煮麵糊丸麻子大米飲下家傳斬鬼丹截瘧神效黃丹研獨頭大蒜研爛如泥上於五月五日午時至誠修合用蒜泥和丹同杵衆手為丸隨人大小發日五更取長流水面東下四聖丸治瘧有效穿山甲去筋膜兩半灰炒拌雞骨常山烏梅去核焙檳榔各一兩上為末糯米糊丸隨人大小黃丹為衣每服二十五丸至三十丸臨發日五更面東溫酒送下柴胡桂枝湯治瘧疾寒多熱少者用小柴胡湯柴胡二錢五分黃芩半夏各一錢人參錢半甘草五分合桂枝湯桂枝芍藥加栝蔞根牡蠣乾薑炮薑棗同煎柴胡白虎湯治熱多寒少者用小柴胡湯合白虎湯石膏五錢知母二錢甘草一錢入粳米生薑同煎一兒歲半病瘧二日一發久不愈其兒黃瘦面浮腹脹豫用平瘧養脾丸治之愈一兒病瘧醫以柴苓湯投之調理二三日不效豫用平瘧養脾丸治之效一兒病瘧醫用截藥內有砒丹三截之遂成疳瘧其父懊恨前藥之誤也豫用平瘧養脾丸治瘧集聖丸治疳調理一月而愈一女先驚後瘧瘧久成疳豫用集聖丸調理一月而安一兒先瘧後驚豫用調元湯琥珀抱龍丸治之安一兒病瘧一日一發豫用家傳斬鬼丹截之止三日後又發再截之凡三截俱三四日又發其父怪問之時六七月棗熟豫疑其必啖生棗故止而復發也問之果然乃禁之先用胃苓丸調理三日更以斬鬼丹截之遂愈汪南汀季子七歲病瘧三年諸醫治之無效乃請豫治之豫視其外候面色黃白山根帶青腹大而堅曰此久瘧成癖癖在潮熱當與補脾消癖瘧熱自除恨無九肋鱉甲耳南汀求得之因制一方用人參白朮陳皮青皮三稜莪朮木香砂仁當歸川芎黃連柴胡鱉甲為末神麯糊丸炒米煎水日三服調理五十餘日安陸陳巷李宅一女七歲戊戌秋先患外感後變瘧因用截藥變作痢至冬痢雖止瘧益甚請豫往視其外侯大骨高起大肉陷下發稀目陷面黃鼻燥不思飲食唯啖蓮肉乃內傷脾虛疳癆證也時有江西醫人萬鼎在彼謂不可治豫曰無慮吾能治之至春必愈用集聖丸一料次年二月果安一兒病瘧間日一發豫依祖訓當用胃苓丸補之發日以斬鬼丹截之調理半月已漸平復適有麻城丁醫至見兒未大好謂其父曰我祕方只一劑而愈其父惑之不知其所用者何方也初進一劑瘧即大作矣更甚於前豫笑其醫云只用祕方令吾前功盡廢又勞調理也其父悔且怨醫辭去之豫調理一月愈一兒久瘧成癖因癖生熱或三五日一發發則十餘日不止常在申酉時但不寒顫又微惡寒即發熱熱亦不甚發過不渴不頭痛豫用消癖丸平瘧養脾丸相間服之半年而愈一兒瘧後腹脹用加減塌氣丸服之愈疳疳證此小兒科之極病也雖有五臟之不同其實皆脾胃之病也幼科書論諸疳頭緒太多法無經驗無可取者唯錢氏分肥瘦冷熱四者庶為近理而以初病者為肥熱疳久病者為瘦冷疳似有虛實之分不知疳為虛證曾有實者乎至於治瘦冷疳方上有續隨子未免虛實之失故豫嘗曰錢氏方論非先生之親筆乃門人附會之說也今乃推先生之意以補之曰兒太飽則傷胃太飢則傷脾肥熱疳其食多太飽之病乎瘦冷疳其食少太飢之病乎如審其食少者肥兒丸食多者集聖丸主之小兒乳少者父母常以他物飼之兒之性只求一飽或食太多或食太少所以脾胃受傷生此疳病也蘄水陸陳巷李廣之妻程希南之女也新寡止有一女初病瘧又病痢瘦發熱少食日啖蓮肉五六枚請豫往治之豫與集聖丸時有江西一醫萬鼎在彼曰難治鼎嘗問豫運氣之說豫詳教之彼本不知唯唯耳豫謂鼎曰明年二三月來看此女之長大也次年三月半其母在程氏宅請豫謝之命其女拜云小女服後一日改變一日非昔日比也庠生王閒一子周歲因食豬肉受傷肢體瘦削使人求藥豫問其詳乃食積疳似有餘取脾積丸五粒與之教以豬肉湯吞下果下一塊如小指頭大涎沫夾裹其子頓安集聖丸治疳通用丹溪心法黃連乾蟾三錢餘味皆二錢黃連乾蟾炙存性青皮陳皮莪朮使君子砂仁各一錢八分蘆薈夜明砂五靈脂各二錢三分歸身疳癆加川芎各三錢木香一錢八分又集聖丸方使君子乾蟾黃連前胡莪薈木香青皮靈脂夜明砂縮砂仁各二錢當歸錢半川芎一錢二分增膽汁粟米糊丸米飲吞脾弱加肥兒丸併為末粟米粉作糊丸入豬膽汁丸如粟米大米飲下王三峰長子患疳瘦請豫治之見之曰此乳少病也父曰乳極多豫即辭退歸謂其友胡三溪云王子病疳乃乳少也彼云乳多不聽吾言今成疳矣時胡會川在座聞言而退後三溪云病者會川之壻聞兄之言不悅而歸豫曰非也必往邀三峰兄同來也少頃果同至三峰自訴云我南監坐監時一子病疳死今此子病我心甚慮今特來登問此兒討個乳母養有乳無乳實不知也今夜歸家看子細明日來報果無乳也日則嚼飯喂夜則一壺冷米湯灌之奈何豫曰不易乳母治之無功易之則兒戀其乳母之愛母依其兒衣食之計請權擇乳母佐之晝則抱之夜則乳之自然日久情熟事兩全矣乃作肥兒丸一料服之兩月而安肥兒丸人參白朮白茯苓炙甘草陳皮青皮山藥蓮肉當歸川芎使君子為末神麯糊丸米飲下胡鳳崖子病疳但多食則腹痛請豫治之豫曰人以谷為本谷入作痛豈新谷作痛乎必有舊谷為積未能消去故與新谷相持也豈有絶穀食之理乃作養脾消積丸服之安養脾消積丸錢氏異功散即四君子湯加陳皮加木香青皮砂仁使君子枳實炒黃連炒上共為末神麯糊丸米飲下疸疸有二證有因天地濕熱之氣而發之者有因水穀之濕熱而發之者小兒之病多因濕熱食積與大人不同宜茵陳胃苓丸主之胃苓丸末一兩茵陳末五錢碾勻神麯糊丸燈心煎湯下一兒十四歲病疸面目俱黃用黃連黃柏梔子仁茵陳豬苓澤瀉枳實厚朴各二錢大黃一錢上為末神麯糊丸陳米湯下初服二日吐宿冷黃水二三碗又二日利三行五日退調理脾胃人以脾胃為本所當調理小兒脾常不足尤不可不調理也調理之法不專在醫唯調乳母節飲食慎醫藥使脾胃無傷則根本常固矣脾喜溫而惡寒胃喜清而惡熱故用藥者偏寒則傷脾偏熱則傷胃也制方之法宜五味相濟四氣俱備可也故積溫則成熱積涼則成寒偏熱偏寒食也食多則飽飽傷胃食少則飢飢傷脾故調脾胃宜節飲食適寒溫也今之調脾胃者不知中和之道偏之為害喜補而惡攻害於攻者大害於補者豈小小哉兒有少食而易飽者此胃之不受脾之不能消也宜益胃之陽養脾之陰宜錢氏異功散合小建中湯主之人參白朮茯苓炙甘草陳皮白芍當歸桂皮各等分木香砂仁各減半上為末神麯糊丸麻子大米飲下兒有多食而易飢者此脾胃之邪熱甚也宜瀉脾胃之火三黃枳實丸主之枳實白朮黃連黃芩大黃煨各等分上共為末神麯糊丸麻子大白湯下本縣大尹朱云閣公子常有脾胃病向是韓醫生調治平時服養脾丸傷食服保和丸未有寧日一旦問余云聞汝小兒甚精小官人脾胃久虛汝可治之余曰當攻補兼用不可偏補偏攻韓醫云密齊非所長也如專補脾胃則飲食難化如專消導則中氣易耗尹不聽曰汝進一方來乃進養脾肥兒丸用人參白朮甘草陳皮枳實木香茯苓砂仁山藥蓮肉麥芽神麯山楂青皮共為末荷葉浸水煮粳米飯丸麻子大米飲下修合服之大效再無脾胃之病尹乃相信賜匾乳母者兒之所依為命者也如母壯則乳多而子肥母弱則乳少而子瘠母安則子安母病則子病其干係匪輕蓋乳者血所化也血者水穀之精氣所生也飲食入胃氣通於乳母食熱則乳亦熱母食冷則乳亦冷故兒傷熱乳者則瀉黃色黃芩芍藥湯加黃連主之傷冷乳則瀉青色理中丸主之乳多者則絶之不爾令兒吐乳也乳少者宜調其乳母使乳常足不可令兒飢以他物飼之為害甚大調乳母宜加減四物湯豬蹄湯主之乳母忌酒面生冷次及一切辛熱之物常作豬蹄湯與之甚良乳母經閉經漏宜請醫治之恐乳少也一小兒食肉早得脾胃病或泄痢腹大而堅肌肉消瘦已成疳矣其母日憂兒病益深豫見憫之乃制一方人參黃耆蜜炙白茯苓白朮粉草當歸川芎以補脾胃養氣血陳皮青皮半夏曲木香砂仁枳實厚朴神麯麥糵面以消積三稜莪朮煨九肋鱉甲醋煮以消癖黃乾蟾燒灰存性使君子夜明砂以除疳熱共二十三味碾末粟米糊丸麻子大每服二十五丸炒米湯下調理而安乳食兒之賴以養命者也養子歌云乳多終損胃食壅即傷脾甚矣乳食之不可不節也難經云損其脾者調其飲食適其寒溫誠調理脾胃之大法也蓋飽則傷胃飢則傷脾熱則傷胃寒則傷脾今之養子者穀肉菜果順其自欲唯恐兒之飢也兒不知節必至飽方足富貴之兒脾胃之病多傷飲食也貧賤之子無所嗜而脾胃中和之氣不損也傷之輕者損谷自愈傷之重者則消導之宜胃苓保和丸養脾消積丸主之傷之甚者則推去之審其所傷之物如傷熱食者宜三化丸三黃枳朮丸木香檳榔丸傷冷物宜三稜消積丸丁香脾積丸主之如脾胃素弱食少但過食則傷者補脾進食肥兒丸要藥也一富家生子甚弱結義豫為家公豫重其義朝夕戒其乳母乳食不可太飽或煮以爛粥嚼而哺之其一切肉果餅粑甘肥生冷之物皆禁之或有小疾專以補脾胃為主其子自幼至長亦無大疾今氣實力壯飲食多而不傷寒暑不能侵南北奔走不為勞嘗語人曰生我者父母也養我者萬家公也一兒生二月忽昏睡不乳豫以日計之非變蒸也視有二乳母皆年少氣壯者其乳必多更代與之必傷乳也戒以今且損之令飢一日自愈後宜絶之只用一乳母可也次日果安父母如其教亦無傷食之病醫藥者兒之所以保命者也無病之時不可服藥一旦有病必請專門之良老誠忠厚者浮誕之粗工勿信也如有外感風寒則發散之不可過汗亡其陽也內傷飲食則消導之不可過下亡其陰也小兒易虛易實虛則補之實則瀉之藥必對證中病勿過劑也病有可攻者急攻之不可喜補惡攻以夭兒命雖有可攻者猶不可犯其胃氣也小兒用藥貴用和平偏熱偏寒之劑不可多服如輕粉之去痰硇砂之消積硫黃之回陽有毒之藥皆宜遠之故發散者宜惺惺散消導者宜保和丸虛實補瀉按錢氏五臟補瀉之方加減用之誤服熱藥者宜大豆卷散主之誤服寒藥者宜益胃散主之汗下太過者宜黃耆建中湯主之小兒久病只以補脾胃為主補其正氣則病自愈宜養脾丸加所病之藥一二味在內服之或問脾胃補瀉之味豫曰天食人以五氣地食人以五味五氣者寒熱溫涼平也五味者酸苦辛甘鹹也氣為陽陽不足者補之以氣味為陰陰不足者補之以味故肝屬木味以辛補酸瀉氣以溫補涼瀉心屬火味以咸補苦瀉氣以熱補寒瀉肺屬金味以酸補辛瀉氣以涼補溫瀉腎屬水味以苦補咸瀉氣以寒補熱瀉是四臟者各屬一季味則逆之氣則從之以補以瀉也至於脾胃屬土寄於四季無定位無從逆也故於五味相濟四季均平以中和為主補瀉亦無偏勝也況脾喜溫而惡寒胃喜清而惡熱偏寒偏熱之氣固不可以專用而積溫成熱積涼成寒雖溫平涼平之藥亦不可以群聚久服也經云治熱以寒溫而行之治寒以熱涼而行之斯為善矣一人自知醫生一男謂小兒脾不足作補丸服之至於有疾不肯請醫亦自治之豫曰小兒無病不可服藥古人所謂無病服藥如壁中安柱此言何謂也五行之理偏勝則害病必請醫如耕當問農織當問女之意也醫不三世不服其藥自非專門之術而病之虛實藥之良毒吾恐必誤也一兒八歲形氣甚弱其父責令讀書豫見之謂其父曰令郎形氣弱當懷保之不可一於嚴也乃留養脾丸肥兒丸與之調理半年後病成疳矣先請一老醫不知幼科謂之傷食用一粒金丹服之病乃劇請豫豫曰前與養脾丸肥兒丸服盡乎曰未服也又問曰今服者何方也曰一粒金丹豫辭曰不可治矣一粒金丹內有草烏巴豆大毒之藥豈可常服者乎此兒脾胃素弱怯食少而瘦故以肥兒丸調理應服而不服一粒金丹大傷犯胃氣此不應服而服傷之重傷謂之虛死在旦夕後果死一庸醫狂悖借父祖專門之名自稱得異人之傳妄立方法變亂繩墨嘗語人曰吾能知人之臟腑有病而去之知其所傷之物而取下之知其疾之順逆而預解之言大而誕人皆信之時有富家楊姓者生二子聞其名而交結之禮意懇至蓋為其子之未出痘也後一子出痘因熱以湯蒸汗而死小子因服附子毒發癰亦死於醫之手惜哉監生胡篤庵咳久不止汗之不可下之不可因於表裡之邪俱甚也自制一方用蘇葉薄荷葉桑白皮末杏霜栝蔞霜桔梗末甘草末各等分虛者加阿膠蜜丸白湯下或口中噙五日而安後以此方治人屢效黃芩芍藥湯治傷熱乳而瀉黃條芩白芍藥各等分甘草減半加黃連等分上水煎服加減四物湯治婦人乳少當歸身川芎生地麥門冬桔梗人參生甘草各等分上銼水煎服更用獖豬蹄新汲水煮爛和汁食之三化丸去胸中宿食菀莝之熱枳實麩炒厚朴薑汁炒大黃各等分上為末神麯糊丸麻子大每服量大小虛實溫水下家傳保和丸補脾胃進飲食治一切食積白朮陳皮半夏曲白茯苓神麯各三錢枳實炒厚朴薑汁炒香附子酒浸山楂麥糵曲各二錢半黃連薑汁炒連翹去子萊蔔子各二錢上為末荷葉浸水煮粳米糊丸麻子大薑湯下三黃枳朮丸治傷肉食麵餅並辛辣肥厚一切熱物黃芩黃連酒炒大黃酒煨神麯陳皮白朮各一兩枳實五錢上為末荷葉浸水煮粳米糊丸麻子大白湯下三稜消積丸治傷生冷一切硬物冷積三稜炮莪朮炮神麯各一錢青皮陳皮小茴香巴豆和米炒焦黑去米各五錢益智仁丁香各三錢上醋麵糊為丸麻子大量人加減生薑湯下益胃散治誤服寒藥過多傷其脾胃者陳皮黃耆蜜炙各七錢益智仁白豆蔻澤瀉乾薑炒砂仁甘草炙藿香葉厚朴制人參各三錢一方有薑黃三錢上為細末每服五分至一錢薑棗煎湯下大豆黃卷散治誤服熱藥此解之貫衆板藍根甘草大豆卷以無根水浸生卷是也日乾各等分上為細末每服五分井泉水煎飲肺臟主病肺主喘實則悶亂喘促好飲水有不飲水者虛則哽氣長出氣實則瀉白散葶藶丸瀉之虛則阿膠散生脈散合甘桔湯補之瀉白散治咳嗽而微喘面腫身熱桑白皮蜜炒地骨皮各等分甘草減半入粳米水煎服阿膠散治久嗽肺無津液阿膠兩半粉炒大力子二錢五分馬兜鈴半兩甘草錢半杏仁七個去皮尖粳米上為末每服量加減水煎服生脈散合甘桔湯久嗽肺虛人參一錢麥門冬二錢五味子十粒苦梗一錢上銼分五劑每劑入阿膠五分水煎肺臟兼證諸氣喘促上氣咳嗽面腫皆肺臟之本病也加味瀉白散主之桔梗防風各二錢甘草一錢地骨皮一錢二分兼見肝證由中風得之鼻流清涕惡風喘嗽宜發散加減參蘇飲主之如久咳嗽變風疾不治如錢氏所謂三瀉肝而肝病不退三補肺而肺證尤虛是也一小兒二歲久病嗽時十月初請豫治之豫曰不可治矣父問其故豫曰嗽者肺病也四時之病將來者進成功者退十月建亥金氣已衰木氣始生吾觀令郎面色晄白肺之衰也頭搖手擺肝之風也肺衰風生作搐而死果不治兼見心證發熱飲水喘嗽悶亂此心火勝也宜涼膈散加知母石膏主之久嗽不止黃連阿膠丸黃連赤茯苓能抑心火肝得其清兼見脾證咳則吐此傷乳食而喘嗽不安宜葶藶丸小陷胸加大黃主之一兒泄瀉後病咳而喘上氣急豫用芎蠍散效一女子脾胃素弱一日啖生棗病腹脹而喘其母憂甚恐夫知食以生冷也豫曰勿憂乃作錢氏異功散加藿香葉以去脾經之濕紫蘇葉以去肺經之風一大劑而脹消喘止一女子素有喘病發則多痰豫用補腎地黃丸服之或怪而問曰喘者肺腑也今補腎何也豫曰肺生氣腎則納而藏之痰涎者腎之津液所生也哮喘吐涎乃氣不歸元津液無所受也果服此丸而安加味瀉白散古瀉白散加蘇葉桔梗是也參蘇飲治傷風咳嗽古參蘇飲紫蘇葉陳皮前胡枳殼桔梗半夏茯苓乾葛甘草人參木香衆藥皆等分甘草減半是也東垣涼膈散治心肺熱甘草梔子薄荷桔梗連翹乃河間涼膈散去硝黃加桔梗是也黃連阿膠丸治肺熱或咯唾血黃連三錢赤茯苓二錢阿膠炒一錢上以蓮肉為末水調膠和衆手丸麻子大米飲下小陷胸加大黃湯治痰壅喘促以代葶藶丸黃連半夏枳實栝蔞和皮用甜葶藶大黃各等分上銼先以水煎栝蔞一沸入藥煎七分食後服芎蠍散治脾虛上氣喘促急嘔吐痰涎足脛冷者川芎蓽茇各一錢蠍梢去毒三分半夏酒浸一宿水洗七次焙乾細辛各二分上為極細末熱湯調稍熱服肺所生病諸氣上逆喘逆皆屬於肺咳嗽有二風寒外感者痰飲者如因感冒得之者必灑灑惡寒鼻流清涕或鼻塞宜發散加減五拗湯主之麻黃連根節杏仁留皮尖紫蘇葉苦梗甘草各等分上銼水煎姜引服得微汗止如發散不退渴欲飲水者宜瀉白散主之如不熱不渴甘桔湯主之桔梗甘草各等分紫蘇葉減半烏梅肉少許上用水煎去渣入阿膠化服因於痰者或母乳多湧出兒小吞咽不及嗆出而成痰嗽者或因兒啼聲未息氣未平強以乳哺氣逆而嗽者此乳夾痰而嗽也宜玉液丸主之有痰甚氣弱不可下宜潤下丸主之陳皮去白淡鹽水浸泡括銼炒枳殼炒桔梗大半夏薑湯泡七次甘草蘇子炒萊蔔子炒白茯苓各一錢上為末神麯糊丸黍米大白湯下發揮云經曰秋傷於濕冬生咳嗽乃太陰濕土之病也凡咳嗽有痰有氣痰出於脾氣出於肝皆飲食之所化脾總司之也飲食入胃脾為傳化水穀之精氣為榮悍氣為衛周流一身晝夜不息虛則不能運化精悍之氣以成榮衛其糟粕之清者為飲濁者為痰留於胸中滯於咽嗌其氣相搏浮澀作癢介作聲而發為咳嗽也故治痰咳先化其痰欲化其痰者先理其氣陳皮枳殼以理肺中之氣半夏茯苓以理脾中之痰此治咳之大略也若夫虛則補之阿膠散實則瀉之葶藶丸祖傳玉液丸小阿膠散阿膠粉炒錢半蘇葉一錢烏梅少許每服四字水煎服監生胡篤庵滋元溪翁之子也辛丑方四歲二月間患咳嗽因與吾不合請醫張鵬素所用者以葶藶治之隨止隨作四月間咳甚又請醫甘大用治以五拗湯暫止復作更迭用藥咳不得止秋益甚咳百十聲痰血並來至九月加重事急矣不得已欲請豫治乃筮之得蹇之漸其辭曰大蹇朋來遂請豫往豫以活人為心不記宿怨視其外候兩頰微赤山根青準頭紅視其內證果咳聲連至百十氣促面赤痰先出而血隨之痰血既來其咳方定問其所起之時曰自二月有之問其所服之藥曰某用葶藶丸某用五拗湯豫細思之此病起於春初春多上升之氣木旺金衰法當抑肝補脾以資肺之化源以葶藶瀉肺此一逆也夏多火熱火旺金敗法當清心養肺治以寒涼反用五拗湯甘熱之藥犯用熱遠熱之戒此再逆也今秋氣宜降矣而上氣急者春升之令未退也氣宜斂矣而痰血並出者夏火之氣未退也必與清金降火潤肺涼血非三五十劑不效也乃告之曰令郎之病肺有虛火幸過秋深金旺可治吾能愈之假以一月成功元溪曰何太遲也曰病經八月無效公不曰遲而以一月為遲何哉又思豫雖用心彼終不安乃語元溪云請置一簿自初服藥日起某日服某藥某日加減某藥彼聞之喜終有疑心因制一方天麥門冬知貝母桔梗生甘草陳皮去白枳殼阿膠片芩蘇葉水煎一本無枳殼蘇葉有瓜霜花粉前胡取茆根自然汁和飲之五劑後咳減十分之七口鼻之血止矣元溪終不釋疑又請醫萬紹治之或謂豫曰他不要爾爾可去矣豫曰彼只一子非吾不能治也吾去彼再不復請也誤了此兒非吾殺之亦吾過也雖然且看萬紹用何方用之有理吾去之如又誤必力阻之阻之不得去未遲也乃語元溪云令郎之病吾今治之將好一半矣如何又請他人彼云有病衆人醫恐一人之見有限也豫曰然紹立一方以防風百部杏仁桑白皮之類豫謂紹曰王好古湯液本草風升生例防風居先此兒肺升不降肺散不收防風百部豈可並用耶紹云防風百部治咳嗽之神藥也元溪從旁和之云他是祕方豫曰吾為此子憂非相妒也故撫其子之頭曰且少吃些可憐疾之復作奈何囑畢不辭而退元溪略不介意是日服紹藥才一小杯咳復作氣復促血復來如初其子泣曰吾吃萬先生藥好些爺請這人來要毒殺我其妻且怒且罵元溪始悔親至大用之家豫被酒困坐待夜半方醒元溪拜謝祈請之心甚切豫嘆曰早聽吾言不有此悔要我調治必去嫌疑之心專付託之任以一月為期至家鄧夫人取白金五兩權作利市小兒好時再補五兩不敢少望先生用心豫曰只要專信我用我使我治好了不在謝之多少也至此專心聽信依舊照日立方血止後去芩梔加冬花五味咳止後以參芩白朮散調之凡十七日而安如舊謝歸因名其方曰潤肺降火茆根湯今吾子等用之皆效黃州府省祭許成仁有子病咳血醫用吾茆根湯治之不效吾見之與其醫云病不同也彼乃肺中有火氣逆而嗽此則肺虛嗽血矣乃立方與之用阿膠珠天門冬麥門冬桑白皮蜜炒桔梗甘草蘇葉烏梅柿霜煎服五日效麻城曾藝塘喻長州之妹壻也病咳半夜甚其子年九歲乃胎稟之不足腎虛嗽也用人參固本丸加阿膠桑白皮蜜丸服盡劑而安本縣汪元津一子病腎虛嗽與上證同請豫治用人參固本丸加白茯苓知母貝母山藥各等分為末蜜丸服之安凡小兒百日內嗽不止者名百晬嗽難治宜甘桔湯加阿膠主之小兒素有哮喘遇天雨則發者蘇陳九寶湯主之如吐痰多者六味地黃丸主之發揮云腎者水臟也受五臟六腑之津液而藏之入心為汗入肺為涕入脾為涎入腎為精入肝為淚凡咳嗽之多吐痰乃腎之精液不歸元也宜補腎地黃丸主之加巴戟杜仲鹽水炒肉蓯蓉酒洗去甲小茴香炒破故紙炒研末蜜丸煎麥門冬湯下本縣胡三溪長女素有喘痰發則多吐痰涎用上補腎地黃丸人初不知有笑之者後喘止痰止乃信之凡小兒久嗽不止面目浮腫者此肺氣逆也宜五皮湯加蘇葉最妙一富室小兒瀉泄後病喘急豫思此脾虛也寒濕之氣上升也用陳氏芎蠍散一服而止一兒三歲病嗽血醫用茆根湯主治豫阻之彼有後言豫笑曰此吾家方也不信以夫子之道反議夫子乎因制一方用阿膠珠桑白皮蜜炒杏仁桔梗甘草紫蘇葉各等分為末蜜丸芡實大每一丸陳皮湯下五日而安喘嗽肺主喘嗽喘有順逆嗽有新舊須辨明之喘順者或因風寒而發不然則無是病也此屬外感宜發散五虎湯主之或有喘病遇寒冷而發發則連綿不已發過如常有時復發此為宿疾不可除也初發之時且勿治之待其少衰宜蘇陳九寶湯主之慎勿用砒霜輕粉諸毒藥攻之與其巧而無益不若拙而行其所無事也逆者大病與諸危篤病但氣喘急痰涎有音皆惡候也不治惟腫脹之病常有喘者宜蘇子降氣湯主之嗽新者因風寒中於皮毛皮毛者肺之合也肺受風寒之邪則發為咳嗽其證或鼻流清涕或鼻塞者是也宜發散華蓋散作丸服之即三拗湯加減法也或因乳得之凡兒啼哭未定不可以乳強入口乳氣相搏而逆必嗆出也胃氣既逆肺氣不和發為痰嗽咳則吐乳是也宜順氣和胃加減大安丸主之初傷乳者未得順氣化痰以致脾胃俱虛乃成虛嗽宜健脾補肺消乳化痰三奇湯主之久嗽者初得病時因於風者未得發散以漸而入於裡肺氣益虛遂成虛嗽宜潤肺兼發散人參潤肺散主之久嗽不已服上諸藥不效者宜神應散主之氣弱者必用之劑也如氣實者不可服宜家傳葶藶丸主之久嗽不已嗽而有血者此肺損也宜茆花湯主之久嗽不已胸高起如龜殼此名龜胸難治宜家傳葶藶丸主之咳止者吉不止者發搐必死久嗽不已日漸羸弱又發搐者此慢驚風不治如不發搐但羸瘦者此名疳瘦宜人參款花膏合阿膠丸主之久嗽不已而浮腫者五皮湯加紫蘇葉主之久嗽咯唾膿血者此肺癰也宜桔梗湯主之復嗽不止發搐者死小兒初生至百日內嗽者謂之百晬內嗽痰多者宜玉液丸肺虛者阿膠散主之此名胎嗽最為難治如喘嗽氣逆連聲不止以致發搐必死華蓋散治肺感風寒痰壅咳嗽麻黃去節杏仁去皮尖蘇子炒橘紅去白桑白皮蜜炒茯苓各等分甘草減半上為末蜜丸彈子大每一丸薑棗煎水服人參款花膏治久咳肺虛款冬花百合桑白皮蜜炙五味子人參各等分上為末蜜丸芡實大每一丸紫蘇葉煎湯下加減三奇湯治傷乳嗽痰湧吐乳桔梗陳皮去白白茯苓青皮蘇子炒人參桑白皮炒各五錢半夏麵炒七錢枳實炒甘草炙各三錢杏仁十枚上為末薑汁煮神麯糊丸黍米大滾白水下九寶湯陳皮麻黃薄荷各一錢桂枝蘇葉杏仁大腹皮桑白皮甘草各二錢烏梅一枚生薑三片上用水煎一本有桔梗入童便五虎湯治肺喘麻黃七分杏仁一錢甘草四分臘茶葉八分石膏一錢五分上作一服水煎本方去茶石膏加紫蘇葉桑皮等分名家傳五拗湯家傳葶藶丸葶藶丸去防己牽牛加蘇子炒陳皮去白等分棗肉丸是也加減大安丸治傷乳喘嗽此保和丸加減法也陳皮去白半夏白茯苓白朮枳實炒桔梗各等分蘇子炒甘草炙萊蔔子炒各減半上為末薑汁煮神麯糊丸麻子大淡薑湯下桔梗湯治肺癰桔梗生貝母當歸栝蔞仁枳殼炒薏苡仁炒桑白皮防己各二分黃耆分半甘草節生用杏仁去皮尖百合各一分上銼生薑水煎神應散治一切虛嗽粟殼去筋蒂酒炒杏仁去皮尖炒白膠香人參阿膠麻黃去根節烏梅去核各二兩桑白皮炒款冬花各一兩甘草炙兩半上為末量人加減薑棗煎服一女子四歲嗽久不止胸高起狀如龜殼嗽則其骨扇動母之父知醫治之不效問豫何如豫曰此肺熱而脹成龜胸也嘗聞諸父教云龜胸龜背書皆有之無治法也後嗽不止發搐而死腎臟主病腎主虛無實地黃丸主之唯瘡疹腎實則黑陷此非錢氏之語乃記者之誤焉而不詳者也以啓後人之疑有瀉腎之方如百祥丸之類有補腎瀉腎之論令兒夭折盡信書則不如無書也蓋人之一身肺主皮毛心主血脈脾主肌肉肝主筋腎主骨髓五臟之有腎猶四時之有冬也瘡疹之毒乃自骨髓出現於筋肉血脈皮膚之外如品物之翕聚於冬者發散而為春之生夏之長秋之收也變黑歸腎則不能發散於外而反陷於內此腎中真氣之虛邪氣之實所以立百祥丸牛李膏以瀉腎中之邪氣非瀉腎之真氣也況腎中之水潤澤光壯由津液之充滿也瘡疹黑陷者正腎主虛水不勝火津液乾枯故變為黑倒陷入里所謂瀉之者瀉火救水之良法詳見痘疹心要腎臟兼證諸虛不足胎稟怯弱者皆腎之本臟病也五臟病後成腎虛者各用地黃丸加減隨證惟瘡疹歸腎有補有瀉變黑倒陷者宜百祥丸牛李膏瀉之泄瀉灰白癢塌者宜陳氏異功散補之詳見痘疹心要兼見肝證驚風及手足癰者宜地黃丸加牛膝當歸續斷各二兩肉桂一兩為末蜜丸服兼見心證驚風及失音不語者宜地黃丸加石菖蒲柏子仁遠志各二兩為末蜜丸服兼見脾證吐瀉及變痢疾者宜地黃丸加黃連黃柏各酒炒二兩乾薑炒車前子肉豆蔻麵煨各一兩為末蜜丸服兼見肺證咳嗽痰中有血宜地黃丸加天門冬麥門冬焙知母黃柏蜜水炒阿膠炒各二兩蜜丸服陳氏異功散木香人參當歸陳皮肉豆蔻煨丁香厚朴各錢半肉桂茯苓白朮各二錢半夏附子炮各一錢上銼姜二片棗二枚煎服腎所生病錢氏曰腎主虛即胎稟不足之病也按經云腎主骨骨會大杼大杼以上喉骨也項者頭之莖莖弱則頭傾矣大杼以下脊骨也脊者身之柱脊弱則身曲矣脊之下尻骨也尻骨不成則兒坐遲矣尻骨之下則胯骨也胯骨弱則不能立矣胯之下膝骨也膝骨弱則不能行矣齒者骨之餘骨氣不足則齒生遲矣發者血之餘腎之主血血不足則發不生矣皆胎稟不足之病也謂之五軟此兒難養並宜六味丸加當歸杜仲牛膝川續斷主之腎肝在下母子也腎主骨肝主筋骨屬於筋筋束乎骨二者相為依附也肝虛筋弱者亦宜地黃丸主之乃虛則補其母也腎主骨髓脊者髓之路腦者髓之海也肝之脈與腎脈內行於脊骨之中上會於腦故頭破解顱脊疳之病乃肝腎之風熱子傳於母之病也解顱者有二或生下之後頭縫四破頭皮光急日漸長大眼楞緊小此髓熱也又有生下五六個月後囟門已合而復開者此等小兒大數難養腎肝風熱之病宜加味瀉青丸主之所謂實則瀉其子也蘆薈瀉青丸加黃柏黃芩黃連等分碾末蜜丸服肝疳者小兒生後生瘡成餅狀如覆盤此風熱也宜加味瀉青丸加蔓荊子白蒺藜炒脊疳者小兒疳瘦脊如鋸齒肋骨高起拍之有聲宜集聖丸加龍膽草梔子仁黃柏同為丸服齒根黑爛臭息出血者名走馬疳橡斗散主之櫟橡子殼不拘多少入鹽填滿二斗相合放火中燒過研末搽牙豫有一族孫無父周歲生走馬疳豫用尿桶底白垽刮下瓦上焙乾五分五倍子內蟲灰三分鼠婦焙乾三分枯白礬一錢共研末先用臘茶葉浸米泔水洗淨以藥付之神效名曰不二散兒有大病暴喑失聲者此腎怯也宜地黃丸加石菖蒲主之痘後小兒有平時大便常難者後重者此腎虛血不足病也難經云利如下重是也不可聽信庸醫妄用下劑宜地黃丸加當歸二兩火麻仁二兩主之五臟虛實補瀉之法按五臟虛實補瀉之法引經解之經云邪氣盛則實真氣奪則虛所謂實則瀉之者瀉其邪氣也虛則補之者補其真氣也如真氣實則為無病兒矣豈有瀉之者乎云肝常有餘脾常不足者此卻是本臟之氣也蓋肝乃少陽之氣兒之初生如木方萌乃少陽生長之氣以漸而壯故有餘也腸胃脆薄穀氣未充此脾所以不足也小兒五色修明聲音清響此心肺之氣足也乳食能進大小便調此腸胃之氣足也手足和暖筋骨剛健此皆腎肝之氣足也是謂無病易養不宜妄投藥餌誅罰無過也如面色晄白聲音微小此心肺不足也乳食減少吐痢頻並此腸胃不足也顱解項軟手足痿弱此肝腎不足也是兒多病難養此以形體之虛實辨五臟之強弱也有病者各宜隨五臟之虛實按方治之小兒熱證有七面腮紅大便祕小便黃渴不止上氣急脈弦急足脛熱以上不宜服熱藥小兒冷證有七面晄白糞青色腹虛脹眼珠青嘔奶乳脈微沉足脛冷以上不宜服寒藥此熱證者邪氣實也宜用寒涼瀉之如服熱藥謂之實實寒證者真氣虛也宜用溫熱補之如服寒藥謂之虛虛經云毋實實毋虛虛毋夭人長命此之謂也因五邪之氣所生病經云春傷於風夏生飧泄飧泄者謂飧食不化也發揮云難經有五瀉之辨脈訣云濕多成五瀉又有胃風湯證雖大小不同間亦有之不可不知也如傷風吐瀉者風屬木脾胃屬土土虛故木乘之水穀不化謂之完穀也此從胃中來故不化若自小腸來則半腐化出來成糟粕矣自大腸來水穀已別谷多水少矣故傷風飧瀉有惡風表證者宜發散之桂枝湯加羌活黃芩防風或瀉青丸去大黃加炙甘草或加減敗毒散無表證者神朮散風瘧柴苓湯加減敗毒散去獨活枳殼加當歸各等分薑棗引神朮散治春傷於風夏生飧泄蒼朮一錢半藁本川芎各六分羌活四分甘草炙六分細辛二分上為末分二服姜水煎如下鮮血者此風熱也胃風湯主之傷風咳嗽此風入肺也宜發散人參荊芥散主之見驚風條內夏月傷暑作吐瀉者宜加味五苓散主之豬苓澤瀉白朮白茯苓桂枝藿香葉砂仁各等分為末白湯化下夏月泄瀉小兒極多治有三法清暑一也利小便二也溫中三也以涼藥止之治壞病也發揮云初瀉有發熱口渴者此宜以清暑氣為先不可便用理中湯丸恐內有熱乾薑犯時禁加減香薷飲主之香薷黃連炙甘草各等分上煎湯熱服或理中湯冷服之或六一散生薑湯調服如初水瀉無熱無渴者不可服玉露散太多恐犯胃氣也宜理中湯加藿香煎成湯澄冷服或理中丸用冷水化開服之玉露散寒水石煅三兩滑石三兩甘草末一兩共研勻冷水調服如上法不止者宜利小便有熱有渴者六一散同服無熱無渴者入理中丸化開服之此吾家傳治夏月瀉泄之良方也從吾法者有發有降違吾教者得少失多詳見前豫甘妾初生男未周歲六月病瀉妾兄甘大用吾所傳者治之不效反加大熱大渴豫歸問曰所服者理中丸吾蓋料其不知用熱遠熱之戒犯時禁也乃制玉露散以解時令之熱冷水調服一劑而安玉露散自此收入小兒方也本縣一屠家徐姓者有兒十二歲六月病瀉請大用用因前失以玉露散服之不知中病即止恐犯胃氣之戒又失之此兒初服藥後瀉渴俱止再服之瀉益甚又服之大熱大渴面赤如火張口喘呼用見事急自邀我同看豫問所服者何藥也云前所制玉露散也又問服幾次其父母應云初服一次效後連服三日越服越不好望相公救之豫教用理中湯加熟附子一片服之又教云服藥後若安靜即止藥後若煩躁再與一劑用受教往治果加煩躁連進二服而安用獲厚謝特至吾家拜曰以報日前之教因問豫二子病證相同治法各別何也豫曰夏至後瀉者七分熱三分寒治此瀉者當七分寒藥三分熱藥前證因汝多服理中湯犯用熱遠熱之戒故用玉露散以解火令之熱後證因汝過服玉露散傷其中氣故用理中湯加附子以救里也用曰何以安靜者不治煩躁者反可治也曰夏至後垢卦用事伏陰在內六月建未其位在坤坤為腹而生土土愛暖而惡寒玉露性寒傷其脾土陰盛於內陽脫於外故用理中附子之辛熱所以收斂欲脫之陽勝其方長之陰服藥安靜者脾氣敗絶投藥不知故不可治如煩躁者寒熱相搏脾有生意故再投藥使勝其寒也用曰如此神妙豫初何以知之下次治此熱瀉當如之何豫曰看其病證何如瀉多熱渴少者急以溫中為主先進理中湯後以玉露散微解之不渴者不可用也先大熱大渴瀉少者此裡熱甚也急解其暑毒以玉露散解之熱渴略止後用理中湯補其中氣泄止不可再服也如渴不止只用白朮散治之理中玉露皆不可服也切記吾言再勿誤也白朮散治瀉渴不止要藥也如服白朮散渴瀉不止者此水壅以犯腎腎得水而反燥故轉渴瀉宜白朮散去乾葛加炒乾姜等分服之辛以潤燥致津液用自此後醫術漸通家道頗昌暑瘧者柴胡白虎湯即小柴胡合白虎湯暑咳者甘桔湯合黃連阿膠丸經云夏傷於暑秋髮痎瘧豫謂瘧之為病不唯中暑有之凡風寒暑濕飲食勞倦皆能為病也大抵民病瘧痢者多蓋四時之氣太陰濕土之令手太陰肺經受風寒暑濕之氣病瘧多足太陰脾經受飲食水穀之邪則病痢多二經俱受邪則瘧又病痢也病瘧者平瘧養脾丸主之病痢者和中丸主之此家傳不易之祕法也寶之重之勿輕示人也難云形寒飲冷則傷肺肺主皮毛秋冬病宜攻者多因傷寒得之鼻塞聲重宜發散麻黃湯主之麻黃連根水泡去沫杏仁去皮尖炒生甘草各等分上用水煎服熱甚者加生石膏末臘茶葉名五虎湯神效濕傷腎利而下重秋月病痢者皆腎病也宜地黃丸去丹皮加黃柏酒炒破故紙炒小茴香炒各二兩乾薑炒黑五錢研末丸服經云冬傷於寒春必病溫溫熱之病也況冬月暄熱令行則陽氣暴泄不能閉藏為寒所折至春則發為熱病也小兒得之則發瘡疹病者亦溫熱之類也如有此氣宜預服代天宣化解毒丸甚有良驗附湯方一天保采薇湯羌活前胡半夏陳皮柴胡赤芍白茯苓川芎枳殼厚朴桔梗蒼朮升麻葛根藿香獨活甘草二犀角解毒湯治胎熱丹毒犀角赤芍生地黃白芷甘草連翹荊芥防風牡丹皮木通三導赤散治夜啼木通生地甘草竹葉黃芩四大連翹飲治胎熱等症連翹赤芍歸尾木通甘草防風荊芥五理中湯治胎寒等症乾薑白朮甘草人參若加附子名附子理中湯六鉤藤膏治內釣吐痛乳香沒藥木香殭蠶共為丸鉤藤湯下七地黃茵陳湯治疸黃生地歸尾豬苓天花粉赤芍赤苓茵陳澤瀉甘草八芍藥湯治夜啼泄瀉白芍澤瀉甘草大茴薄荷木香茱萸生薑九六君子湯治脾胃虛寒等症陳皮半夏人參白朮甘草白茯生薑大棗引十固真湯治慢驚四肢冷不省人事附子甘草人參山藥黃耆肉桂白朮白茯薑棗引十一保元湯治汗多變慢驚黃耆人參甘草生薑三片大棗一枚水煎服十二姜半散治吐不止將成慢驚半夏生薑肉桂十三調脾湯治脾疳陳皮白朮丁香人參訶子青皮甘草十四六味地黃丸治骨疳牡丹皮熟地黃白茯苓山萸肉酒蒸去核白澤瀉懷山藥上為細末煉蜜丸如桐子大空心滾水送下十五蘆薈丸治丁奚哺露蘆薈人參白朮白茯山藥木香陳皮青皮麥芽神麯當歸各三錢檳榔兩個麝香少許上為細末豬膽打麵糊為丸如麻子大清水湯送下十六小異功散治先瀉後吐脾胃虛冷人參白朮橘皮白茯薑棗為引煎服十七黃連芍藥湯治先吐後瀉黃連芍藥豬苓澤瀉白茯白朮甘草十八五苓散治吐瀉豬苓白朮白茯澤瀉肉桂十九消導二陳湯導痰消食健脾陳皮半夏白茯白朮蒼朮神麯香附砂仁甘草二十六和湯治暑瀉陳皮半夏白茯甘草黃連厚朴藿香香茹加扁豆木瓜二十一胃苓湯治長夏暑澤瀉陳皮白茯豬苓厚朴白朮蒼朮甘草二十二助胃膏治胃氣虛寒嘔吐人參白朮白茯甘草山藥木香丁香藿香砂仁二十三訶附丸治飧泄訶子肉灶心土黑附子為末米糊丸如粟米大用米湯下二十四十六味肥兒丸治脾胃虛弱人參白朮白茯山藥薏仁米芡實蓮肉甘草陳皮山楂麥芽砂仁黃連澤瀉芍藥連翹上為末蜜丸如彈子大米湯下二十五承氣湯治裡急後重腹痛痢疾朴硝大黃枳實厚朴二十六木香檳榔丸治食積黑醜檳榔木香神麯大黃上為末生薑汁糊丸如粟大米湯下二十七補中益氣湯黃耆人參甘草陳皮白朮升麻柴胡當歸二十八四順清涼飲治中焦熱白芍當歸生地甘草柴胡二十九人參敗毒散治積毒嘔惡柴胡前胡川芎羌活獨活白茯苓枳殼桔梗甘草人參生薑引三十四君子湯治脾胃不調等證人參白朮白茯甘草薑棗引三十一薑茶飲治赤白痢陳茶生薑黃蠟鹽車前葉三十二四獸飲治虛瘧白朮人參白茯草果半夏甘草陳皮烏梅薑棗引三十三人參養胃湯治瘧寒多熱少陳皮半夏茯苓人參蒼朮厚朴草果藿香姜引三十四清瘧飲柴胡枳殼青皮半夏白朮黃芩厚朴豬苓白茯苓澤瀉陳皮甘草貝母知母前胡三十五隨用截方加常山草果檳榔姜引系加在前方煎服三十六參蘇飲人參蘇梗桔梗前胡半夏乾葛陳皮枳殼杏仁木香甘草茯苓用姜引三十七五子五皮飲治腫脹蘇子山楂子萊蔔子葶藶子香附子桑皮橘皮大腹皮茯苓皮生薑皮三十八瀉黃散治濕熱腫脹赤茯黃連黃柏黃芩山梔澤瀉茵陳三十九瀉白散治肺熱甘草桔梗陳皮桑皮地骨皮四十四物湯調益榮衛川芎當歸熟地白芍四十一麥門冬飲治吐血久不止麥冬黃耆當歸人參生地五味子四十二清胃湯治糞後見血山梔子生地牡丹皮黃連當歸四十三茵陳湯治黃疸茵陳梔子黃柏四十四祛風散治天柱骨倒防風甘草羌活細辛黃芩白芷薄荷當歸川芎四十五滋陰降火湯治陰虛痰結當歸地黃白芍黃連白茯苓知母天花粉蓮子黑玄參甘草麥冬燈心引四十六五淋散治血淋赤苓赤芍山梔仁條黃芩當歸甘草燈心一團引四十七清脾飲治熱瘧或熱多寒少青皮半夏黃芩甘草白朮白茯苓柴胡陳皮草果厚朴薑棗引四十八人參安神湯治心血不足驚悸不眠麥冬人參當歸黃連棗仁生地茯神四十九安神湯治心血不足驚悸人參半夏棗仁茯神當歸橘紅赤芍五味子甘草姜引五十寧心丸麥冬五錢去心寒水石一兩白茯苓甘草牙硝山藥各五錢硃砂一兩龍腦一字上為細末煉蜜為丸如芡實大每服半丸砂糖水磨下如慢症用人參白朮煎濃汁化下五十一肝疳丸五靈脂夜明砂龍膽草天麻乾蟾頭全蠍二個蟬蛻川芎蘆薈黃連青黛防風上為細末豬膽汁浸為丸麻子大每十丸薄荷湯下五十二化䘌丸治肝疳蕪荑青黛蘆薈川芎白芷胡連川連蝦蟆灰各等分為末豬膽汁浸糊為丸麻子大每服二個臨臥杏仁湯送下五十三褐丸子治疳脹蘿蔔子一兩青皮陳皮檳榔赤茯苓黑牽牛莪朮五靈脂各五錢木香減半上為末麵糊如緑豆大每五十丸桑皮紫蘇煎湯或蘿蔔湯下五十四加味二陳湯治夾暑傷寒吐瀉陳皮半夏白茯苓甘草厚朴香茹黃連山楂麥芽神麯木通澤瀉五十五香茹飲治暑熱香茹厚朴扁豆黃連五十六清心蓮子飲治溺血麥冬地骨皮黃芩甘草白茯苓黃耆柴胡人參石蓮肉五十七瀉青湯治囟填羌活川芎梔仁龍膽草當歸防風各等分大黃減半竹葉引五十八清金飲治傷風嗽吐前胡杏仁桔梗桑皮半夏甘草旋覆花薄荷陳皮水煎五十九小續命湯治剛柔痙病麻黃人參黃芩川芎芍藥甘草杏仁防風防己肉桂附子水煎六十芎蘇飲川芎蘇葉陳皮半夏前胡桔梗枳殼乾葛白茯苓甘草六十一瀉肝湯車前木通生地歸尾山梔黃芩龍膽草甘草各等分六十二松蕊丹治龜背松花枳殼防風獨活各一兩麻黃前胡大黃桂心各五錢為末蜜丸黍米大每服三十丸粥飲下六十三寬氣化痰丸治龜胸大黃三分杏仁百合木通桑皮甜葶藶天門冬石膏各五錢為末煉蜜丸緑豆大食後臨臥白熱水化下六十四柴胡梔子飲柴胡山梔白茯苓川芎白芍當歸丹皮牛蒡甘草等分水煎子母並服六十五固腸飲治久痢不止木香黃連當歸白芍人參白朮白茯苓甘草訶子肉水煎六十六屈膝散治鶴膝防風薏苡仁牛膝苦參女便浸曬何首烏男便浸曬各一兩殭蠶天花粉荊芥穗各五錢肥皂核肉一兩鹿茸五錢共為粗末每用三錢同冷飯糰四兩牯豬油六錢黏米緑豆各一撮水四碗煎至二碗分作二次溫服六十七豬乳膏治胎風胎驚牛黃硃砂各少許取豬乳調抹兒口中六十八黃耆升麻人參白朮陳皮神麯澤瀉黃柏當歸青皮乾葛五味甘草水煎服六十九八珍湯人參白朮茯苓甘草川芎當歸熟地白芍薑棗引七十藿香正氣散治傷脾胃外感寒邪藿香紫蘇大腹皮陳皮桔梗甘草茯苓半夏神麯厚朴白芷薑棗引七十一疏風順氣湯治風寒發喘紫蘇乾葛桑皮前胡麻黃杏仁甘草水煎服七十二清肺湯白朮茯苓陳皮薄荷南星桑皮細辛甘草桔梗七十三備急方治夜啼內吊煎蔥湯淋洗其腹又用艾絨烘熱包圍其腹十數次其痛漸止七十四蓮花飲甘草知母蓮花須川蓮仁栝蔞根五味人參乾葛白茯苓生地竹葉七十五參竹湯麥冬人參竹葉甘草半夏小麥粳米陳皮生薑
