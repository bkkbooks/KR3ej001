body:
  text: 卷之二急驚風證臍風發搐者難治初生月內非臍風證發搐者此胎驚也宜至聖保命丹金銀磨水送下或用全蠍一枚薄荷葉包炙為末硃砂末三分和勻豬乳調服常發者名胎癇不可治也如變蒸發熱甚發搐者只用導赤散瀉青丸主之效瘡疹未出發搐者此吉兆也宜用導赤散煎調硃砂服之效或將靨發搐者凶兆也此毒氣攻心宜急解救之用真牛黃腦子各一分硃砂末五分和勻豬尾尖血和丸小粟粒大每一丸燈草煎湯化下丹瘤發搐視其先後何如先發丹後發搐者不治此胎毒自外入里也先發搐後發丹此名驚丹可治此胎毒自內而外也宜用大連翹飲主之連翹一錢瞿麥一錢滑石一錢車前子一錢大力子一錢炒赤芍一錢木通五分梔子三分當歸五分防風五分黃芩一錢五柴胡二錢甘草炙二錢荊芥穗一錢蟬蛻一錢上為細末再加大黃燈心水煎蟲疥浸淫瘡入腹發搐難治急用雄黃解毒丸升麻煎湯下瘡再發兒搐止者吉咳嗽發搐視其病之新久如初咳嗽時痰盛氣促連聲不止而不能治發搐者宜葶藶丸蘇葉煎湯下利去其痰咳止搐亦止矣如久嗽不止者難治宜用小阿膠散服五分至一錢煎去渣灌下如發搐後變嗽者此風邪入肺也宜人參荊芥散再發之陳皮去白荊芥穗桔梗半夏桂枝細辛木通甘草炙杏仁去皮尖上各等分水煎薑引泄痢發搐如先吐瀉或痢疾久不止以致脾胃虛弱者此慢驚風也難治如先發搐後發泄痢者此因發搐之時多用利驚下痰之藥或多用寒涼之藥傷其胃氣泄痢不止宜補澀之錢氏異功散加木香砂仁肉豆蔻訶子肉為末山藥粉糊丸米飲水調之瘧疾發搐瘧作熱時發搐者此宜截去其瘧瘧止搐亦止矣小柴胡湯加常山檳榔烏梅發日服以截其瘧發過服辰砂五苓散以定其搐神效如發搐後變瘧者此脾風之證也宜平瘧養脾丸主之蘄水李中庵吾壻也一兒未周歲因傷食發瘧間一日一發在子丑時瘧發搐亦發也發時咬牙呻喚大便黃緑努黃而出用口吮母口得乳即止瘧後汗出心下跳腹中鳴退後頂上有小熱其父母愛惜之心瘧退搐退則喜而稱愈瘧搐俱發則憂懼不勝其母又不禁口病未十日成疳矣面色㿠白囟陷發疏兒漸羸瘦請豫治之豫曰此兒先受暑濕暑則為瘧濕則為痰又傷飲食助其暑濕之邪暑則傷心濕則傷脾暑生熱濕生痰脾土一衰肝木隨旺瘧曰食瘧疳曰食疳當從虛治且大哭手撤皆肝膽之病子時屬膽咬牙者心肝俱熱也肝木心火子母病也大叫哭者肝病也呻喚者腎病也腎水肝木母以子病也肝者厥陰風木也心跳者少陰君火也水火相搏則內作搐故大便努黃而出用口吮母之口此內熱作渴也兒口不能言得乳自解汗出者初發之時邪氣拂鬱及其退而有汗此真氣外泄也故治瘧之法無汗要有汗散邪為主有汗要無汗養正為主此兒汗泄於外便泄於內心下跳腹中鳴皆火盛證也肝膽從火治此其法也退後頂熱兒頂出顛亦厥陰肝經之脈也豫制一方兩治之於平疳止搐方中加治疳之藥於補脾消瘧方中加止搐之藥調理五日瘧搐俱止兒亦漸肥而疳瘦除矣附其方於下其平疳止搐加減於當歸龍薈丸用歸身人參炙甘草柴胡川芎各一錢青皮蘆薈木香各七分膽草酒洗梔仁各五分半夏大者三個一本有黃芩陳皮神麯糊丸黍米大每服二十五丸寅卯時竹葉煎湯下治瘧補脾加味參苓白朮散人參黃耆蜜炙歸身九肋鱉甲使君子白芍藥酒炒各一錢炙甘草青皮去白各八分厚桂澤瀉木香夜明砂柴胡各五分陳皮七分一本有乾蟾蓮肉共碾末山藥糊丸粟米大每服三十丸巳戌二時服炒米湯下乳母服加味四物湯當歸川芎赤芍藥生地黃柴胡升麻麥門冬木通黃芩酒炒桔梗各五分薄荷葉七分燈草水煎服急驚風變證急驚風變成癇者此心病也心主驚驚久成癇蓋由驚風既平之後父母玩忽不以為慮使急痰停聚迷其心竅或一月一發或半年一發或一年一發發過如常近年可治久則不可治矣宜服如神斷癇丸治之黃連五錢白茯苓三錢石菖蒲三錢膽星一錢珍珠一錢鐵花粉一錢硃砂飛三錢甘遂五分上為細末粟米粉煮糊入獖豬心血三枚同杵勻為丸如彈子大每一丸取獖心一枚切開兩片入藥在內線扎定水煮熟分三服本湯送下一兒三歲病驚風后未服豁痰安神之藥自後成癇每發之時面色青黑兩目連札口如嚼物涎出於口昏眩仆地當欲發之狀即以手探其口中以吐其涎如此調理至七歲不作矣一兒四歲病驚已絶豫用針刺其湧泉一穴而醒自此驚已不發豫謂其父曰此驚雖未發未服豁痰之藥若不早治恐發癇也父母不信未及半年兒似痰迷飲食便溺皆不知也時復昏倒果然成癇病其父來訴曰不信先生之言誠有今日之病願乞醫治不敢忘報豫乃問其子爾病發時能自知乎子曰欲昏則發乃作錢氏安神丸加膽草服之教其父曰爾子病將發時急掐兩手合谷穴如此調治一月而安急驚風成癱者肝主風風淫末疾故驚風之後有手足癱瘓而不能舉者此血虛不能養筋故也宜地黃丸加當歸牛膝川獨活肉桂為丸服之一女子十四歲病驚風后右手大指次指屈而不能伸醫用羌活防風天麻全蠍殭蠶蟬蛻諸風藥治之病益甚豫嘆曰彼庸醫也不知手足不隨血虛也伸而不能屈者筋弛長也屈而不能伸者筋短縮也皆血虛不能養筋之證也手大指者太陰肺經之所主手次指者陽明大腸之所主肺與大腸皆屬燥金此血燥之象也一切風藥助風生燥故血轉虛而病轉盛口授一方用黃耆人參天麥門冬生熟地黃當歸各等分官桂減半為引經橫行手指之端共為末煉蜜丸芡實大每一丸食後湯化下一小兒驚風后右手僵硬五指拳曲不能舉物兼口角流涎語言謇澀豫曰此脾有濕痰脾不足而肝木乘之不可治也急驚風類證天釣似癇天釣者壯熱驚悸眼目翻騰手足指掣或啼或笑喜怒不常甚者爪甲皆青如祟之狀故宜和解風熱鉤藤散主之鉤藤一兩五錢白茯苓一兩五錢防風二錢硃砂飛二錢大黃酒濕紙煨二錢五分蟬蛻二錢羌活二錢獨活二錢青皮二錢炙甘草二錢上為末薑棗煎服此瀉青丸變化加減也痓病似天釣痓病項背強直腰身反張搖頭掣瘲噤口不語發熱腹痛鎮日不醒其狀可畏但受病與天釣不同中風自汗不可再汗汗多則發痓中濕宜微汗不可大汗大汗過則發痓有剛柔二痓無汗曰剛痓宜麻黃葛根湯有汗曰柔痓宜桂枝葛根湯二痓並宜人參敗毒散加防風主之麻黃葛根湯麻黃去節一兩五錢赤芍藥一兩五錢葛根一兩半蔥白二莖豉半合上銼散每服二字煎服桂枝葛根湯桂枝白芍藥甘草各二錢七分半葛根一兩半生薑一兩大棗四枚上銼散每服三字煎服內釣似癇內釣腹痛多啼唇黑囊腫傴僂反張眼內有紅筋斑血者是也此寒氣壅結只宜溫散木香丸主之沒藥木香沉香舶上茴香炒鉤藤各等分乳香全蠍減半上為末取大蒜研爛和丸梧桐子大每服二丸鉤藤湯化下盤腸似內釣盤腸氣痛乾啼額上有汗是小腸為冷氣所搏也宜金鈴子散主之金鈴子二錢舶上茴香鹽拌炒木香各一錢上為末每服五分至一錢調酒服當歸散治寒邪入腎經小腹急痛面青手足冷者歸身木香肉桂人參炙甘草加破故紙炒小茴香炒上各等分為末薑棗湯調服棗為丸亦可或問天釣內釣病痓盤腸屬何臟何以辨之曰經云身半以上天氣主之身半以下地氣主之故天釣在上生於風熱宜發之內釣在下生於寒宜溫之二釣者皆足厥陰肝病也足厥陰之脈外則與督脈同行循脊而上入於顛之頂所以病則目上翻背後仰如角弓之反張也內則循陰器而入於小腹所以病則小腹切痛為囊腫也諸風掉眩皆屬肝木故二釣皆有搐掣似驚但天釣或哭或笑內釣則多啼為異耳痓病屬足太陽膀胱經上起兩目上頭循項而下行於背循腰而下於是與厥陰之脈下行者同所以角弓反張之證亦相似也但天釣有搐掣而痓病無搐掣也盤腸痛屬手太陽小腸經內行於小腹與厥陰之脈內行者不同所以小腹忽痛也但內釣有瘛瘲而盤腸痛無瘛瘲可辨也客忤似癇客忤者口中吐青黃白沫水穀鮮雜面色變異喘息腹痛反側瘛瘲狀似驚癇但眼不上竄耳治法宜辟邪正氣散驚安神蘇合丸至聖保命丹主之客忤者謂客氣忤犯主氣之病也如五氣之邪自鼻而入則忤其心肝五味之邪自口而入則忤其脾胃有所驚恐則忤其神有所拂逆則忤其意當博求之故曰心誠求之雖不中不遠矣詳見育嬰家祕一兒半歲忽日慘然不樂昏睡不乳豫曰形色無病將謂外感風寒則無外感之證將謂內傷乳食則無內傷乳食之證此兒莫非有所思思則傷脾乃昏睡不乳也其父母悟云有一小廝相伴者吾使他往今三日矣乳母亦云自小廝去後便不欣喜不吃乳父急命呼之歸兒見其童嘻笑父曰非翁之妙術不能知也一兒一歲啼哭不止豫審察之非病也其父母曰無病何以啼哭異常豫問其乳母此兒平日戲玩者何物乳母曰馬鞭子即以取至兒見大笑擊人而哭止一兒九月吐乳便黃身有微熱豫曰此傷熱乳也吐作腥氣今已成積母曰未食熱物豫密語其父曰必傷交奶得之父問何謂交奶豫曰父母交感之後以乳哺兒此淫火之邪忤脾胃正氣也不治之必成癖矣何以致曰淫火者肝火也病則發搐癖者脾病也積不消則為癖父問何以治之曰瀉肝補脾乃以瀉火胃苓丸服之中惡似癇中惡小兒之危惡也其病有二如中惡毒之氣者病自外至其證眩僕四肢厥冷兩手握拳不能喘息先用霹靂散躑躅花一分半雄黃三分麝香少許上為末用燈心三寸長蘸藥少許插入鼻孔得嚏即醒蘇合丸灌之或攝生飲南星煨一錢半半夏洗一錢半木香一錢半生蒼朮一錢生甘草一錢石菖蒲一錢上銼入生薑用水煎服盡一劑以平為期如內生中惡毒之物病自內生其證心腹刺痛腹皮青黑悶亂欲死宜急攻之雄黃解毒丸主之白虎證似癇白虎證乃流年白虎歲前九位之神兒觸犯之則不精爽而目視不轉手如數物宜服至聖保命丹取太陽真土伏龍肝杵碎煎湯送下取龍虎相制之義或問客忤中惡白虎三證何氣使然曰皆客氣也客氣不正之氣也兒之所稟謂之主氣為之忤者謂之客氣經云邪之所湊其氣必虛故兒之主氣強者雖有客氣不能忤也主氣弱者稍有所忤則成病矣客忤者病之總名也中惡則客忤之重者白虎則客忤之輕者治法皆以辟邪養正安神和胃為主蘇合香丸治三病之聖藥也蟲病似癇蟲病乃蛔蟲攻其心痛也發則目直視口噤不言或大叫哭口中流沫涎水面色或青或白手足強直宜急攻之雄黃解毒丸苦楝根皮煎湯下馬脾風似癇馬脾風者肺脹也上氣喘急兩脅扇動鼻張悶亂喘喝聲嗄痰涎壅塞其證危惡宜急攻之牛黃散主之黑白牽牛頭末一兩大黃二兩檳榔五錢木香三錢輕粉少許上為末和勻每服用冷水或漿水調服或問何以謂之馬脾風曰午屬馬為少陰君火心主熱脾主虛心火乘肺脾之痰升故肺脹而喘謂之馬脾風也一兒四歲忽作喘氣逆痰壅鼻孔開張豫曰此馬脾風也如胸高肩聳汗出發潤則不可治須急治之以葶藶丸去防己加大黃除肺之熱合小陷胸湯除肺之痰碾為細末竹瀝調服而愈慢驚有三因因病後或吐瀉脾胃虛損遍身冷口鼻亦冷手足時瘛瘲昏睡露睛此無陽也宜待其未發而治之調元湯合小建中湯主之如見上證雖有神丹不可治也或問吐瀉何以生風而不可治者何也曰五行之理氣有餘則乘其所勝不足則所勝乘之吐瀉損脾脾者土也風者肝木所生也脾土不足則肝木乘之木勝土也其病不可治人身之中以谷為本吐多則水穀不入瀉多則水穀不藏吐則傷氣泄則傷血水穀已絶血氣又敗如之何不死也或問風從風治何以所立之方不用風藥何也曰內經云肝苦急以甘緩之以酸泄之以辛散之又云脾欲緩急食甘以緩之調元湯參耆甘草之甘甘可以緩肝之急為治風之聖藥也而又可以補脾芍藥桂枝苦辛為從可以建中二方合而用之治慢驚風者此東垣老人之祕傳也因得驚風醫用利驚之藥太多致傷脾胃元氣益虛變為慢驚者此外風未退中虛又生風虛相搏正去邪存大命隨傾此慢驚風證尤慎於始也一兒五歲病痢醫用藥治之痢轉甚其脾胃中氣下陷也豫用參苓白朮散調之十日痢止豫辭歸有惑者謂其父曰無積不成痢富家之子多有肉積吾有阿魏嘗用治痢有效父惑而聽之乃以阿魏作丸如小豆大連服三丸其子昏睡適豫又至以服阿魏丸告豫驚曰阿魏雖去肉積大損元氣令郎脾胃已弱豈可服之父曰病安而喜睡未醒也豫謂乳母叫之則目露睛氣已絶矣有兒脾胃素弱一日病瀉以理中丸服之瀉未止口內生瘡謂兒前藥性熱助火復以冷藥投之身微熱睡則揚睛豫見之曰此兒發慢驚風脾胃本虛瀉則益虛口中生瘡者脾虛熱也誤服冷藥則中氣益損昏睡不乳虛損之極也當急作調元湯加倍人參服之調理半月而愈一女子五個月內發搐豫以瀉青丸投之三四服搐不止轉甚豫思痰壅氣鬱乃發搐也丸散頗粗與痰黏滯於咽喉之間致氣不通而搐愈甚也用竹葉煎作湯取綿紙濾去其渣滓澄清服之搐止其父嘆曰醫之貴於變通也如是夫一小兒得真搐豫曰不治彼家請一推拿法者掐之其兒護痛目瞪口動一家盡喜再觀兒斜視彼曰看娘兒口開張彼曰尋娘乳吃豫嘆曰誤矣睹子轉睛謂之看娘急口開張謂之尋乳皆死證也其夜兒果死肝主風急驚風搐搦振掉肝之本經氣動所生也當急治之得心熱則發宜瀉青丸用導赤散煎湯送下而愈初發搐昏睡不醒或掐人中或掐大陵或灸中衝待其醒而藥之或用白殭蠶豬牙皂角細辛川芎藜蘆等分為末吹鼻中嚏者可治不嚏者不可治如頑涎壅塞者用殭蠶末吐之或礞石滾痰丸吐之家傳三黃五色丸下之小兒發搐如法治之搐止者吉也如時發時止昏睡不醒不乳者死兒一歲發搐不止口鼻氣出溫者此真搐也不可治搐後易醒口鼻氣出熱者此假搐也可治錢氏云氣溫則內生謂肝之真臟病見者故曰真氣熱者病自外生者也故曰假先翁治一兒滿月後發搐以至聖保命丹治之安祖訓治急驚風只用瀉青丸導赤散舊縣張月山長子病急驚風十七日不醒待請豫到舌色黑矣豫嘗見父念玉函經傷寒舌黑洗不紅藥洗分明見吉凶全問曰用何藥洗之父曰薄荷湯乃依法急取薄荷湯洗之舌變紅色豫曰可治也用瀉青丸二錢煎湯服之一飲而盡口燥渴已止矣其夜搐止熱退而安此子不遇豫幾死汪元津幼子七月間因傷食病瘧七日發搐豫見之肝風雖甚脾未至困當瀉其肝後補其脾可也乃以瀉肝散三服而搐止後用調元湯以補其脾琥珀抱龍丸以平其肝喜睡二目不能開豫思喜睡者非脾困也乃神昏欠惺惺也目屬肝而胞屬脾合目不開者非亡魂也乃神倦也今兒目欲開欲合可知也只用前方又二日令其家中平日相與嬉戲者取其小鼓小鈸之物在房中床前唱舞以娛之未半日目開而平復也凡十日而安胡鳳崖有子痘瘡後傷食疳飢瘦發穗有醫童一册見之曰不是疳證乃血虛也其家惑之始效則生一病如癇非癇晝則安靜夜則夢寐抱其乳母叫云我怕我怕如人捕之狀詢其病原此兒性不食藥一册來喂藥必將針火以恐嚇之而得斯疾也蓋胃為戊土腎為癸水合而化為火腎主恐恐則傷腎此因脾胃虛弱不能生肺腎無化原亦從而虛也腎藏志腎虛則神志不寧而生驚恐也寤則神棲於心寐則神棲於腎脾志往來出入之門戶也必以補脾為主安神次之補脾肥兒丸安神錢氏安神丸調理半年而安天釣內釣足厥陰肝經之脈起足大指而上環陰器左交右右交左上入小腹下會督脈循脊膂過而上至於顛如風傷肝則發天釣其狀眼上翻頭頂向後仰身反折渾如角弓之狀錢氏云肝有風甚則角弓反張者是也天釣屬木宜發散瀉青丸中去大黃加天麻全蠍殭蠶鉤藤內釣者肝受寒則小腹痛大叫哭目直視但不搐耳宜急溫其內當歸茱萸湯及木香丸當歸茱萸湯當歸吳茱萸炮焙乾小茴香炒甘草木香木香丸方見驚風類證小兒腸痛亦在小腹腰屈空啼無淚此名盤腸痛證似內釣但不直視也金錠子散見類證主之㿗疝此厥陰肝經痛也與腎無干皆寒所致有腫而不痛者名㿗痛而不腫者名疝有腫又痛名㿗疝茱萸內消丸主之本縣大尹梁公子病疝右邊睪丸腫大如雞卵長約五寸上絡臍傍下抵陰囊直直硬痛大小便不通急召全全立方用當歸川芎木香青皮去瓤山梔仁山楂子小茴香川楝子澤瀉二劑而安卵腫小兒性急多哭者有之豫曾治小兒立方用香附子川芎木香青皮山梔子麥芽等分作丸服之又小兒腸痛豫用諸證辨疑內一方五苓散加川楝子小茴香入鹽一捻煎神效肝之竅在目目赤痛者肝熱也宜瀉青丸加黃連作丸服之目中白膜遮睛者肝虛也宜瀉青丸去大黃梔子加干菊花木賊蟬蛻作丸服之經曰肝有熱者則小便先赤導赤散加梔子條芩膽草甘草梢主之本府三守小姐溺出如青水著肉處潰爛成瘡夫人憂之守問全云莫非女之臟腑壞也答云膀胱受五臟之液以藏之是為溺也各隨本藏之色青者肝之色也著處成瘡肝火盛也火之所灼則潰爛矣全獨治之以前治小便赤方更加黃柏為丸調理五日而安夫人大喜命小姐出而拜之治陰臭神效方當歸膽草山梔子木通車前子澤瀉甘草梢條芩水煎服肝有病則大便難瀉青丸木通散主之錢氏云肝熱者手循衣領及亂捻物或咬牙一小兒五十日晝夜啼哭不止豫用瀉青丸五釐竹葉煎湯入砂糖少許調服立止咳嗽不止作搐者此肺衰而肝木侮之也當先補肺阿膠散後瀉肝瀉青丸搐止者可治不止者不治水寡乎畏也錢氏所謂三補肺而咳嗽不除三瀉肝而肝搐不止者是也蘄水舉人蔡沙江有子病咳久不止請豫治豫往見其連聲不止咳時面青右手常自擺動謂沙江曰令郎不可治也沙江問何故曰嗽者肺病也肺屬金面青者肝之色也肝屬木手擺者肝風欲發之狀也木來侮金寡乎畏也維今十月金病木生之時四時之序將來者進成功者退木生而進金病而退發搐不可治也甲乙日劇果甲乙日搐而死黃州府甘秀才女驚後右手大指屈而不能伸醫用全蠍殭蠶治之不效問豫求治法肝主筋筋賴血養故曰掌得血而能屈也血燥則筋枯屈而不能伸也手大指手太陰之脈所出也金本性燥復用風藥以治之燥益甚矣劉宗厚云休治風休治燥治得火時風燥了乃授一方用人參固本丸加黃芩黃柏知母作丸服之百日內兒搐最惡謂之胎驚錢氏論詳驚風后餘證搐後成癱瘓者左氏謂風淫末疾是也肝主筋肝熱則筋弛而長長則軟弱手足伸而不能屈矣肝寒則筋縮而短短則拘攣手足屈而不能伸矣並宜六味地黃丸主之拘攣者加附子肉桂軟弱者加黃柏知母當歸牛膝續斷蜜丸服之驚風后喑不能言宜六味地黃丸加巴戟遠志石菖蒲本縣一尹吳子生四個月病驚風搐過則昏迷不醒發搐則醒眼邪視右手搐搦請豫豫曰此真搐不可治乃辭退心經主病心主驚實則叫哭發熱飲食而搐虛則困臥悸動不安實則導赤散瀉心湯虛則二安神丸服之導赤散治心熱及小便赤夜啼生地黃木通甘草梢炙各等分銼加竹葉水煎食前服加黃芩名火府散瀉心湯治驚熱神效黃連去須一錢為細末每服一字至五分臨臥溫水調服錢氏安神丸治邪熱驚啼心疳面黃頰赤壯熱麥門冬馬牙硝白茯苓山藥寒水石煅飛甘草各五錢硃砂一兩飛腦子一字上為末蜜丸芡實大每半丸砂糖水化下無時東垣安神丸經云熱淫所勝治以甘寒以苦瀉之以黃連之苦寒去心煩除濕熱為君以甘草生地黃之甘寒瀉火補氣滋生陰血為臣以當歸身補其血之不足硃砂約浮遊之火以安其神也甘草五錢半黃連六錢酒炒當歸身二錢半生地黃一錢半硃砂五錢水飛為末上為末蒸餅丸黍米大硃砂為衣每服十丸至三十丸溫水送下心經兼證諸熱驚悸不安多啼此心臟本病也宜導赤散加硃砂主之甚者涼驚丸三黃瀉心丸兼見肝證則發熱而搐宜木通散主之兼見脾證則嗜臥夢中咬牙多驚宜錢氏安神丸主之兼見肺證則發熱作搐而喘宜清寧散主之兼見腎證為驚癇發則忽然臥僕咬牙搐搦手足逆冷發過即醒精神恍惚蓋心藏神驚則傷神腎藏志恐則傷志小兒神志怯弱有所驚恐則神志失守而成癇矣如書傳所謂請僧寄名僧為摩頂誦咒兒被嚇而成癇後見穿皂衣人即發是也亦有驚久成癇者初起即可治定志丸主之父母怠忽久而不治遂成終身之患一小兒驚後成癇豫制一方天水散一料研為細末分作三劑二兩三錢入真青黛五錢碾勻名清魂散寅卯時煎竹葉湯調服一錢以平肝火一劑二兩三錢入硃砂末水飛五錢名安神散巳午時煎燈草湯調服以鎮其神一劑二兩三錢入真輕粉二錢研勻名定魂散申酉時煎淡薑湯服以去其痰旬日而安一小兒十歲久得癇疾豫視兩目渾白無有睛光語言謇澀舉動癡迷乃語其父曰不可治矣後請醫治之竟無功驚久成癇乃痰迷心竅之病最為難治或分五癇以牛馬狗豬羊名之者未見其方不必拘也錢氏五癇丸祖訓未用豫亦不敢輕用也兒有者當先觀其狀貌而後治之可也如伶俐聰明者可治之若成癡呆言語錯亂不必治之如強治之終無成功間有聰明伶俐治之無效非真癇也此宜琥珀抱龍丸主之或辛香者不如抱龍丸猶穩蘄水周維峰有子病癇豫見神氣昏滯語言含糊狀類癡呆告其父曰不能治也辭歸黃州府萬魯庵有子病癇豫見容貌俊偉性格聰明告其父曰可治乃與琥珀抱龍丸方使自制服之本縣汪前川兒驚病一月之間嘗發二三次豫曰不治必成癇也求治於豫乃立一方用枳實黃連半夏白茯苓各等分折半硃砂飛又折半同前碾末神麯糊丸芡實大硃砂衣每服一丸用獖豬心一個劈開入藥在內線扎定放瓦罐中煮熟取出豬心和藥食之以湯送下後竟不發名曰斷癇丸心所生病經曰諸痛癢瘡疾皆屬心火諸瘡發揮云心火者君火也君務德而不為毒為癢痛瘡瘍者乃命門相火之所為也小兒諸瘡皆胎毒也命門者右腎也雖云男子以藏精女子以系胞父母命門之中原有伏火胚胎之始兒則受之既生之後其火必發為癰疽丹疹癬一切惡瘡名曰胎毒者是也古人立法於兒初生之時有拭口法有黃連甘草朱密法無非以解毒而設也後人因之合上三法取臍帶合藥名曰育嬰延齡解毒丹方備載在前幼疾條內東垣之治紅絲瘤丹溪之治小便淋皆有解毒之法見格致餘論請博求豫立一方以丹溪三補丸半生用半酒炒甘草半生半炙各等分為末雪水丸麻子大硃砂雄黃各二分之一水飛為衣淡豆豉湯送下初生二臘內服之良天行痘疹之歲尤宜服之小兒初生有育嬰延齡解毒丹服之能解其胎毒其有發瘡瘍者有溯源解毒湯乳母服之丹瘤此胎毒之最酷者即紅絲瘤也名龍纏火帶也乃小兒之惡疾二歲以上兒可治半周歲者難治百無一二也發處腫硬一塊其色甚赤手不可近如火炙流銅往下繞走自頭上起至心即死自足下起至腎即死古方治法無可取者唯家傳蜞針法砭法出其惡氣以泄其火毒十治六七誠良法也經云血食者決之是也切不可用寒冷之藥敷之使火毒鬱而不得泄入腹為腹脹為腹痛為喘為驚狂為搐搦者必死宜用通聖散全料銼細入酒中浸濕曬乾炒碾為極細末蜜水調服外以通聖散加金銀花藤葉煎湯浴之此水漬法亦火鬱則發之也先發驚後發丹者可治通聖散主之或用導赤散加連翹玄參防風荊芥穗瀉青丸先發丹後發驚者不治疥癬乾者可治胡麻丸主之若浸淫潰爛內無完膚日夜啼哭者不可治切不可用砒硫粉汞為藥搽之使毒氣乘虛入腹發搐發喘者皆死胡麻丸胡麻仁炒苦參甘菊花大力子炒石菖蒲何首烏威靈仙蔓荊子烏梢蛇酒浸去皮骨取肉焙乾各等分一本有蒺藜炒黃連炒無蛇上為末酒為丸麻子大竹葉湯下此祖傳十三方也治小兒瘡疥宜調乳母溯源解毒湯主之人參歸身赤芍藥川芎黃連酒炒連翹木通生地黃陳皮甘草水煎服以少許喂兒佳一本有竹瀝小兒生下遍身蟲疥干癢喜人摩拍豫制一方用烏蛇酒浸焙乾取肉一錢苦參酒浸焙乾二錢胡麻仁炒白蒺藜炒去刺各一錢五分共為末用浸蛇與苦參酒糊為丸甘草湯下愈一兒五歲每至春時則遍身生膿胞瘡此胎毒也豫戒用搽藥恐粉砒硫之毒乘虛入腹以胡麻服之而愈更灸風池血海曲池三里自此再不發矣兒瘡入腹腹脹大小便不通或喘或作搐者先用雄黃解毒丸治之雞冠雄黃飛二錢真鬱金莊大黃各二錢巴豆霜一錢一本無大黃上共碾勻水糊丸小豆大每服一二丸茶清下此祖傳十三方也黃州李四守生子五個月遍身濕疥一旦盡干召全問之全曰瘡出驚止無憂也連更數醫不能治小兒生癰毒者不可輕針恐傷筋骨慎之一子滿月後血盆中發一癰請外科胡長官針之斷其骨竟不可救小兒頸下或耳前後有結核者此熱也切不可作瘰癧治之內服蟹螯外施針灸及爛藥必殺兒也戒之豫家傳消結神應丸乃新立真神方也黃芩酒炒黃連炒山梔仁生貝母海昆布酒炒海藻洗桔梗麥糵炒各一錢五分紫背天葵玄參連翹瞿麥各二錢薄荷葉一錢五分上共為末酒煮稀糊丸芡實大每服一丸酒下蘄水朱震三子結喉上生一核如李問豫求治豫謂病原式云結核者熱也又考本草消結喉之藥立一方與之遂買藥製成碾末溫湯調服效病此者服之無不應驗乃名之曰神應丹團風帥碧泉致仕在家唯一公子項下生一結核惑於醫作癧治用藥破爛轉加腫大此任脈所過之路元氣受傷致成疳證醫無識其證者及請豫往勢不可為矣王思泉一女四歲耳後側有結核問豫豫曰非癧瘡乃痰核也不必治亦不為害為他醫所惑作癧治之用斑蝥內消之藥過多脾胃受傷致成疳癆而死哀哉馬刀多生於耳前後腫硬赤痛俗名痄腮用散毒散敷之神效主方用生緑豆碾為細末釅醋調如膏敷之再換神效又方治結核用五倍子研為細末醋調服之皆效此皆家傳之方也肥瘡膿血堆積久不愈用熟皮灶上煙膠松香共研清油調搽如蟲多不絶用水銀鉛製入鍾內指揉唾調搽上蟲盡斃矣軟癤不愈只用紫金丹水磨搽之膿盡干而自效也又苦參研末敷之耳前後或鼻下或眉間生瘡赤爛用爐甘石海螵蛸研末入輕粉三分之一和勻敷之腳背上生瘡癢痛不常久不愈俗呼牛頸癬用雞子黃熬油搽之舌上生瘡此心脾二經有熱也用柏連散搽之生黃柏生黃連生地黃各等分白檳榔減半研細末搽之滿口舌生瘡乳食不得者宜洗心散服之大黃麻黃白朮當歸芍藥荊芥穗甘草薄荷葉各等分上銼水煎服更用柏連散搽之滿口生白雪瘡又名鵝口瘡先翁用硃砂白礬研末塗口舌效又用鵝公一隻以糯米於口中餵食盡取水洗之一兒患口舌生瘡醫用藥服之搽之者皆芩連知柏類無效豫曰心熱所為苦入心而反助其熱宜無效乃作洗心散與之一服而安豫外甥李中庵子也滿口生瘡咽喉唇舌皆是令人取藥豫制一方用柏連一錢硃砂白礬五分鼠婦焙乾三分共研細敷之立效乃奇方也兒有重舌重齦者宜用三稜針刺去血內服東垣涼膈散凡口內諸病唯針最捷舒舌者心熱也導赤散弄舌者脾熱也瀉黃散主之錢氏云心主驚心藏神兒心氣怯弱或聞大聲見異物異人未有不動其神也謂之客忤驚後其氣不散鬱而生痰痰生熱熱生風如此而發搐者錢氏所謂氣逆而作搐而發驚者是也此驚風二字所以不同凡因驚而發搐者此心火旺而肝木乘之宜先止其搐導赤散作湯吞下河間當歸龍薈丸後安其神錢氏安神丸主之有痰涎壅塞者先降其痰辰砂膏主之次止其搐後安其神辰砂膏下痰甚妙辰砂飛三錢硼砂馬牙硝各錢半玄明粉二錢全蠍去毒珍珠各一錢麝香一字上另為末和均用好油單紙包起自然成膏每用一粒許治諸驚薄荷湯調下治胎驚乳汁和棗湯下先翁治驚風至聖保命丹方見肝部此但加蟬蛻一錢使君子一錢五分英山縣大尹吳清溪子病驚風諸醫作風治之不效急差人請豫豫往見尹曰非風也乃因驚得之風從肝治驚從心治不識病原如何有效乃取至聖保命丹治之搐止次日邑中僚屬士夫皆來問之尹曰名不虛傳果良醫也彼一見自有主意不似他人費力留住數日厚待而歸心屬火惡熱心熱則煩多夜啼宜導赤散主之或日夜啼皆宜服之本縣大尹張鼎石公子生四月無乳取一名壯婦人乳之一夜大啼取醫甘大用治之初所治者呼為腹痛用理中湯不效又呼為傷食用益黃散又不效夜更啼哭急請豫視之甘語其故意欲我扶同其言也心本惡熱藥中又犯乾薑丁香如何不助火而增益其病也乃請公子看之尹曰夜啼四日矣全曰夜啼有四心煩一也尹曰傷食乎腹痛乎余曰腹痛則面多青傷食則面多晄白今面多赤心煩證的也大用趨出豫用導赤散加麥冬燈心進一服次早往問大用自內出雲昨夜到天明不止豫嘆之彼喜其藥不中病也不知病退矣余入問尹曰昨夜哭猶甚也豫告之曰公子病安矣公子貴體違和四日夜未乳昨夜病退思乳乳母在外故知往夜之哭病哭也昨夜之哭飢哭也尹喜曰怪哉乳母來後再不復啼矣病果退矣心熱有喜面合臥者有喜仰臥者宜導赤散三黃瀉心丸主之兒性執拗凡平日親愛之人玩弄之物不可失也失則心思思則傷脾昏睡不食求人不得則怒怒則傷肝啼哭不止此忤其心也謂客忤成病也平日未親愛之人未見之物不可使之見見則驚驚則傷心凡未見之人不可使之近迫近則恐恐則傷腎令兒成癇此皆客忤病也今之為父母者則稱所畏者以止之如長老止夜啼之故事為醫者因兒不服藥則持針摶灸以迫之令兒生病楚府典儀胡西序渤三溪翁之伯子也幼多疾托豫調養至丁酉七月七夕周歲三溪設酒請豫作乞巧會日沒後哭不止豫視之無疾復即席初更哭猶甚母促再視果無疾曰無疾何以黃昏哭一更不止豫思外候無證但見兒左右顧盼其當值之人如有所失者口不能言但啼哭此拗哭也猛詢問其當值曰此兒今日所戲者是玉印子也已收拾矣急命取與之兒笑而哭止三溪曰如保赤子心誠求之善哉添酒歡醉而歸諸汗汗者心之液也唯頭汗不必治小兒純陽之體頭者諸陽之會心屬火頭汗者炎上之象也故頭汗者乃清陽發越之象不必治也自汗者晝夜出不止此血氣俱熱榮衛虛也宜當歸六黃湯主之其方用黃耆以補其衛當歸生地黃以補其榮芩連柏以瀉其血氣之火用浮小麥為引入肺以瀉其皮毛之熱此治諸汗之神方也盜汗者夢中自出醒則干也其病在腎宜當歸六黃湯加止汗散主之錢氏止汗散敗蒲扇燒存性研末入煎藥內假物象形之理也本縣江蘭峰其子七歲頭面出汗如流用人參當歸二味同獖豬心煮湯服之安諸熱小兒病則有熱熱則生風不可不調理也肝熱者目中青手尋衣領及亂捻物瀉青丸當歸龍薈丸主之有身熱口中氣熱濕風溫證者謂之風熱亦肝熱也宜生犀散脫甲散主之心熱者目中赤視其睡口中氣溫合面睡或仰睡上竄咬牙宜導赤散黃連安神丸主之有一向熱不已亦心熱也甚則發驚癇宜黃連安神丸主之如目中熱心虛也宜錢氏安神丸主之脾熱者目中黃弄舌瀉黃散茵陳五苓散主之有但溫而不熱亦謂之溫熱亦脾熱也宜人參白虎湯主之肺熱者目中混白手掐眉目面鼻甘桔湯木通散主之有時間發熱過後卻退次日依時發熱謂之潮熱此亦肺熱宜地骨皮散主之腎熱者目無精光畏明脊骨重目中白睛多其顱即解地黃丸主之熱有表裡表熱者多因傷風寒之故喜人懷抱畏縮惡風寒不欲露頭面面有慘色不渴清便自調者此熱在表也宜發散惺惺散敗毒散升陽散火湯十神湯選而用之裡熱者喜露頂面而臥揚手擲足揭去衣被渴飲冷水兒小不能言吮乳不休者是也小便赤大便祕此熱在裡也宜解利之涼驚丸三黃丸四順清涼飲涼膈散錢氏抱龍丸牛黃涼膈丸黃芩湯選而用之有表裡俱熱者宜通聖散柴芩湯人參白虎湯選用熱有虛實虛熱者多在大病之後或溫熱兼潮熱或渴或不渴大小便如常宜調之竹葉湯調元湯地骨皮散主之實熱者面赤腮燥鼻乾焦喜就冷或合面臥或仰臥露出手足掀去衣被大渴飲水大小便祕宜瀉之神芎丸大金花丸大便不通者用膽導法或問治熱以寒治寒以熱良工不能廢其繩墨也今治虛熱乃用溫藥者亦有説乎豫曰説見內經實熱者邪火也可以水制可以實折故以寒治熱者逆治法也虛熱者真火也水不能制寒不能折唯甘溫之劑可以勝之故以溫治虛熱者從治法也逆之從之不離乎正按錢氏書中有潮熱發搐似驚者附會之説也蓋熱則生風諸熱不退皆能發搐不特潮熱也其以十二時分五臟者固是愚竊有疑焉人身之氣晝則行陽二十五度故晝則發熱夜則明瞭者此熱在氣分宜小柴胡湯白虎湯主之夜則行陰二十五度故夜則發熱晝則明瞭者此熱在血分宜四物合桂枝湯主之如晝夜發熱者此氣血俱虛也宜如前法分表裡虛實治之如日晡潮熱乃胃中有宿食也宜下之小承氣湯三黃枳朮丸主之如傷風發熱傷飲食發熱變蒸瘡疹發熱胎熱疳熱各隨其類治之生犀散治風熱地骨皮赤芍藥北柴胡乾薑各一兩甘草半兩生犀角二錢上為細末每服一二錢水一盞煎七分溫服脫甲散治夾驚傷寒煩躁口渴柴胡當歸龍膽草甘草炙知母各三錢白茯苓二錢五分人參川芎各二錢麻黃連根節二錢熱甚加升麻葛根上為細末每服一錢入連須蔥白煎服黃連安神丸治心熱硃砂飛四錢黃連五錢甘草五分上為末餅丸黍米大每服一二十丸燈草湯下木通散治心肺熱生地黃木通荊芥地骨皮桑白皮炒炙甘草桔梗各等分上銼細入生薑水煎服地骨皮散治夜熱及潮熱虛熱病後餘熱知母柴胡甘草炙人參地骨皮初採者半夏赤茯苓各等分上為末量人大小加減入生薑水煎升陽散火湯治諸熱在表者宜發散之乃火鬱則發之也升麻葛根獨活羌活人參白芍藥各五分防風二錢五分柴胡八分甘草炙二分甘草生二分上用水煎牛黃涼膈丸治上焦壅熱口乾咽痛燥煩涎潮馬牙硝寒水石石膏各二兩甘草微炙一兩膽星三錢紫石英五錢飛牛黃腦子麝香上為末煉蜜丸每一兩分二十四丸每一丸薄荷湯化下神芎丸治一切諸熱實者服之虛者禁用大黃黃芩各二兩牽牛頭末滑石各四兩黃連薄荷葉川芎各半兩上為末水丸隨大小加減溫水下黃芩湯治心肺蘊熱口瘡痛淋濁不利澤泄梔子仁黃芩麥門冬木通生地黃甘草黃連各等分上銼入生薑一片水煎竹葉湯治虛熱竹葉石膏半夏麥門冬人參甘草炙粳米上銼除粳米外先煎衆藥成去渣入米再煎米熟去米服柴苓湯小柴胡合五苓散通聖散大金花丸敗毒散涼膈散河間涼膈散用硝磺東垣涼膈散去硝磺加桔梗四順清涼飲十神湯茵陳五苓散五苓散加茵陳一兒生下便有目赤口瘡之症自是頭常熱山根青筋橫截幼疾甚多豫曰此胎熱也其治在肝小兒者純陽之體頭者諸陽之會肝為乙木旺於春乃少陽發生之氣經云春氣者病在頭故頭常熱也肝之色青故青筋浮露也肝常有餘不治恐發驚風乃用瀉青丸去大黃加黃芩為末煉蜜為丸服之自此頭涼青筋泯沒亦少病矣一兒發熱至日晡尤甚其醫作瘧治不效又作潮熱治亦不效豫曰此胃虛有宿食也謂瘧疾則寒熱有發有止謂潮熱則發有時如水之潮過即退次日依時復發此兒身常溫熱至申酉時則甚故知是宿食發熱也彼曰有所據乎曰出仲景傷寒正理論陽明病證云潮熱者實也宜下之以三化丸下之愈一兒驚風后熱不退群醫有議用小柴胡者有欲用竹葉湯者有欲用涼驚丸者豫曰大驚之後脾胃已虛宜溫補之三藥寒涼不可服也乃作理中湯用炒乾薑一劑熱除已未冬十月本府三守張公子於初三日發熱初五日熱益甚目上直視口多妄言衆醫作風治無效時代巡在府所屬州縣官各舉其醫皆莫治吾縣大尹云閣朱公以全薦張公亟召之全往此二十七日也診其外證稟曰公子病勢將退但肺熱未除耳公曰何如全曰三關黃潤兩目精明此病當愈惟正面載陽喘氣上息此肺虛熱也公喜曰豫正憂其氣喘汝謂無妨當用何藥全曰小阿膠散衆醫嗾而阻之公不聽竟服一劑其夕喘止熱退始求微食二十八日早公謂衆醫曰汝等作風治誤矣昨聽汝等之言則無此效早請汝來此兒不受苦也衆慚而退二十九日賜金馳驛而歸
