body:
  text: 卷之三脾經主病脾主困實則日晡身熱飲水虛則吐瀉生風實則瀉黃散三黃丸瀉之虛則益黃散異功散小建中湯調元湯肥兒丸補之瀉黃散治脾熱弄舌藿香葉七錢山梔仁二兩石膏五錢防風四兩上銼蜜酒炒微香碾為末水煎溫服益黃散治脾胃虛冷陳皮一兩青皮訶子炙甘草丁香各二錢上為末水煎服量大小加減治脾胃寒濕太甚神品之藥也以補脾胃之虛誤矣病非嘔吐瀉痢清白不可服也東垣云丁香辛熱助火火旺土愈虛矣青橘皮瀉肝丁香大瀉肺與大腸脾胃實當瀉子今脾胃虛更瀉子而助火重虛其土殺人無疑故以異攻散代之錢氏異功散溫中和氣治吐瀉不思食及脾胃虛冷痛人參白茯苓白朮甘草炙陳皮各等分上為末每服一錢半至二錢水煎服即四君子加陳皮調元湯補脾胃扶元氣之聖方益脾土瀉火邪補元氣之要藥黃耆蜜炙人參各等分炙甘草減半上水煎不拘時服小建中湯治脾胃中氣虛損加黃耆名黃耆建中湯白芍藥酒炒炙甘草各等分肉桂減半上銼末水煎成劑去渣滓入白餳一匙再煎一沸溫服肥兒丸小兒脾胃素弱食少而瘦或氣強壯偶因傷食或因大病後瘦此家傳祕方人參白朮白茯苓山藥蒸蓮肉當歸酒洗各五錢陳皮二錢青皮木香砂仁使君子神麯各三錢炙甘草桔梗麥糵各二錢上為末荷葉浸水煮粳米粉糊丸麻子大每服十五丸二十五丸三十五丸四十五丸至五十丸米飲送下脾經兼證諸困睡不嗜食吐瀉皆脾臟之本病也昏睡身熱宜胃苓丸琥珀抱龍丸主之吐瀉有冷有熱冷者不渴理中丸主之熱者渴飲冷水五苓散合天水散主之兼見肝證初傷風吐瀉惡風發熱煩急頓悶此宜發散惺惺散主之如先吐瀉後變慢驚風者不治五苓散能分陰陽止吐瀉利小便定驚悸豬苓澤瀉白朮赤茯苓各等分桂減半上銼或為末水煎加硃砂名硃砂五苓散加茵陳名茵陳五苓散天水散一名六一散除熱止渴化涎痰利小便滑石飛過六兩甘草炙一兩上末碾勻水調服惺惺散治傷寒時氣風熱痰涎咳嗽四君子加桔梗細辛栝蔞根防風各等分上為末小者每服一錢大者二錢入薄荷葉五片水煎至七分溫服銼亦可兼見心證發熱昏睡夢中驚悸宜東垣安神丸主之渴飲水辰砂五苓散兼見肺證發熱昏睡氣促而喘者宜葶藶丸主之葶藶丸治傷食沖脾傷風喘嗽痰涎喘促者甜葶藶去皮隔紙炒黑牽牛炒取頭末防己杏仁去皮尖研為膏各等分上研和勻取膠棗肉去皮杵爛入藥再杵丸麻子大每服五丸至七丸淡薑湯食後臨臥送下量兒強弱加減豫今家傳去黑牽牛加蘿蔔子真蘇子炒入尤妙兼見腎證羸瘦痿弱嗜臥不能起者宜脾腎兼補補腎宜地黃丸補脾宜養脾丸如瀉久便膿血者死補腎丸此家傳補脾之聖方小兒脾常不足宜此補之人參白朮茯苓炙粉草白芍酒炒黃耆蜜炒陳皮當歸身山藥蓮肉各一兩神麯五錢肉桂二錢五分上為末荷葉水煮粳米糊丸麻子大用米飲下一女嗜臥發熱項軟頭傾倒不能舉諸醫作風治而遲疑不決豫至見之謂諸醫曰此陽虛病也蓋頭者諸陽之首胃者諸陽之會此女必乳食傷胃胃氣不足故清陽不升而項軟不能任元也可服調元湯一劑而安人皆歎服脾所生病經云諸濕腫滿皆屬脾土腫病腫有二經云面腫曰風足腫曰水凡腫自上起者皆因於風治在肺宜發散之所謂開鬼門者是也鬼門汗孔也參蘇飲合五皮湯主之腫自下起者因於腎虛宜滲利之所謂潔淨府是利其小便也故仲景云治濕不利小便非其治也宜五苓散加防己檳榔主之有一身盡腫者宜胃苓五皮湯主之經鬱則折之謂上下分消以去其濕發汗利小便此方是小兒者胃苓丸煎五皮湯送下胃苓丸此家傳十三方也蒼朮泔浸厚朴陳皮豬苓澤瀉白朮茯苓各一兩甘草官桂草果仁各三錢上為末水面丸麻子大米飲下此小兒常用之藥隨病換引先翁治小兒腫只用胃苓丸正方順收長流水入燈心煎湯送下每日午時用五加皮煎湯抱兒於房內無風處浴之浴罷上床令睡一覺以薄被蓋之得微汗佳如是腫消而止未有不效者五皮湯桑白皮陳皮生薑皮茯苓皮大腹皮水煎經紀萬邦瑞女二十七歲病腫甚異寅後午前上半身腫午後醜前下半身腫上下盡消惟牝戶腫小便難諸醫不能治請豫治之豫曰經云身半以上天之陽也宜發其汗使清陽出上竅也身半以下地之陰也宜利小便使濁陰出下竅也正上下分消以去其濕之法唯半夜陰戶腫不得小便此又當從肝經求之蓋厥陰肝經之脈丑時起於足上環陰器又肝病者則大小便難用胃苓五皮湯發汗利小便也內有茯苓所以伐腎肝之邪木得桂而枯又以辛散其肝經之水以溫腎之真寒濕也連服十一劑而腫盡消去矣豫奉先翁之教凡腫微者只用胃苓丸本方治之如面腫甚者胃苓丸本方內加紫蘇葉二錢苦葶藶一錢隔紙炒以去肺經之風足腫甚者本方內加漢防己二錢牽牛炒取頭末一錢共為丸燈心煎湯下吾有一二門人不守先訓專用葶藶牽牛為治腫之藥隨消隨腫殺兒甚多纍吾之德雖禁之不能阻也湖廣右布政使孫隆慶丁卯入場監試為書經禮記總裁有小姐病留全司中調理小姐誤食菱角傷脾面腫而喘夫人憂之命余進藥余立一方用錢氏異功散加藿香葉以去脾經之濕紫蘇葉以去肺經之風一劑而安場罷後公出見其方謂全曰此方甚好取筆札令舍人孫環書記之小兒病嗽病瘧病瘡後腫者皆虛腫也如受風雨水濕之氣而腫者實腫也通用胃苓丸主之此家傳之法也小兒諸腫不問虛實並用胃苓丸五皮湯主之此家傳也如因喘嗽面目浮腫者宜消腫葶藶丸主之如瘧後遍身浮腫者此因瘧發之後外中風邪內傷冷水得之宜胃苓丸用長流水順取入燈心煎湯送下更於日午浴之法如前如無他病浮腫者視其腫起之處治之如自面起上半身先腫者此風腫也宜五皮湯加紫蘇葉防風主之如從足起下半身先腫者此濕腫也宜五苓散加防己木通主之如腫久不消氣實能食者宜利其水商陸胃苓丸主之腎者水之根濕則傷腎小兒久坐濕地者多此疾如氣弱食少者只以補脾為主脾屬土土能勝水脾強則水去而腫消矣宜參苓平胃散加藿香葉紫蘇葉木香砂仁為丸服之有腎虛者安腎丸服之有面目俱黃遍身俱黃且腫者此黃腫也宜胃苓丸加茵陳服之如黃而不腫者此疸證也觀其色之明黯如黃而色鮮明小便色黃且澀者此熱也宜三黃金花丸主之如黃色昏黯小便不利者此濕也宜茵陳五苓散主之安腎丸大腫不消腎虛不納也川烏炮去皮尖桂心各一兩白茯苓白朮石斛酒炒白蒺藜炒去刺巴戟天蓯蓉酒洗焙故紙炒桃仁微炒去皮尖萆薢各三兩上為末煉蜜為丸芡實大每一丸鹽湯下胃苓五皮湯治腫要藥平胃五苓方見前上銼取長流水燈心煎服商陸胃苓丸病腫氣壯能食者宜此治之謂去菀陳莝潔淨府也上共為末水煮麵丸麻子大每服三十丸至五十丸止大便後快又服衰其半而止一兒瘧後腫用胃苓丸長流水煎燈心湯下又用浴法調理二十日而安一兒病腫有庸醫假專門之名不守家傳之法嘗稱得異人之術用牽牛葶藶為治腫方之神藥作散服之元氣下陷肚大坐不得臥陰囊腫大莖長而卷豫見之嘆曰脾土已敗肝木獨旺乃賊邪也不可治矣果死一兒病腫腹大彼有庸醫妄談五日消一分乃取繩子圍其腹量之投以牽牛葶藶服之利下數行腫減十分之三父母甚喜約至五日再消三分未三日又大腫較大於前庸醫聞之走去病勢益甚而死一義子十五歲病疸面目俱黃豫問之對曰傷食起腹中大熱又痛乃立一方用黃柏梔子等分大黃減半以退其熱豬苓澤瀉茯苓蒼朮等分以去其濕枳實厚朴神麯以去其食積茵陳蒿倍用以去其黃共為細末酒糊丸車前子煎湯下三日後吐去黃水一碗許胃中不熱又二日泄三行腹中不痛十日以後小便漸清黃亦減矣此一段在疸門脹病脹病有二屬虛者多實者少東垣錢氏等從虛治內經云太陰從濕謂寒濕也作熱治者誤矣當以脈證辨之實脹者或因食積或因癖塊先有物在胃腸中而後脹形於外也按之則堅宜消導以去之不可攻之攻之愈虛不可治矣宜胃苓丸主之虛脹者或因吐瀉瘧痢之後脾胃久傷而病此虛氣在於膜肓之外其外雖脹其中無物按之則濡扣之有聲不可用攻攻之即死宜用溫補錢氏加減異功散作丸服之人參白朮甘草炙各一錢陳皮青皮枳實炒厚朴炒半夏曲黃連薑汁炒錢五分木香丁香藿香葉上共為末神麯糊丸麻子大炒陳米湯下因於熱者必口乾飲水神識不清無時譫妄宜三黃丸河間涼膈散仍作膽導法河間涼膈散連翹一錢黃芩二分五釐薄荷葉二分梔子仁三分甘草大黃朴硝各五分上用水一鍾竹葉五片煎臨熟入蜜一匙去渣溫服因於宿食者必惡食吞酸腹中時痛宜三黃枳朮丸方見後木香檳榔丸主之因於積者腹中陳痛丁香脾積丸主之小兒腹脹與大人不同多因傷食得之宜胃苓丸合丹溪保和丸主之如果傷食腹脹或痛吞酸惡食大便不利者宜木香承氣丸主之木香承氣丸枳實炒厚朴薑汁炒檳榔酒浸各等分木香減半大黃酒浸分兩同上三味上為末酒糊丸麻子大白湯下木香檳榔丸治傷一切熱積兼治痢疾腹痛木香檳榔青皮去白陳皮去白莪朮煨黃連黃柏香附子枳殼麩炒各一兩大黃炒黑醜各加二倍婦人加當歸兩半一方有黃芩三稜分兩不同上為末水杵為丸麻子大薑湯下加減塌氣湯治腹脹蓽茇砂仁青皮陳皮丁香全蠍炒萊蔔子炒各等分上為末神麯糊丸麻子大厚朴湯送下豫外甥女有食積脾虛病出痘後又傷食腹脹不喜食豫用胃苓丸方加枳實炒神麯麥糵青皮作丸服之豫孫邦子也先病瘧傷食成疳又傷食甚瘦腹脹大而堅見人則哭豫立一方用人參白朮白茯苓甘草半夏曲枳實炒厚朴黃連木香莪朮砂仁使君子神麯麥芽鱉甲夜明砂當歸川芎等藥一小兒瀉後腹脹豫用加減塌氣丸服之愈一小兒瘧久不退腹大而堅豫用化癖丸服之愈一小兒五歲腹大善食豫見之謂其父母曰乳多必損胃食壅即傷脾令郎腹大如是又不知節縱其口腹吾恐腸胃受傷不成腸癖必成疳也後果成疳肚大青筋請豫治以集聖丸調理而愈一兒善食腹大豫用保和丸胃苓丸二方相間調理而愈一兒因傷食腹痛脹醫用藥下之愈又傷食腹脹醫再下之豫聞之曰非其治也誤殺此兒果半年而死或問何料之神也曰有食飽傷胃而脹法宜消導之不可攻下也有脾虛不能消食食飽則脹者此宜補脾以助其傳化可也豈可下乎此兒初脹食飽傷脾也不行消導乃下之誤矣後又腹脹則脾虛之病也再三下之不大誤乎屢下屢脹故令腹大無紋臍突背平而死雖醫之誤不聽吾言父母之過也腹中有癖瘧後多有之兒有癖者常作寒熱似瘧不可作瘧治也癖去則寒熱自止家傳消癖丸甚效人參陳皮三稜莪朮木香黃連砂仁鱉甲枳實夜明砂使君子乾蟾半夏曲麥芽海昆布上為末酒糊丸麻子大米飲下先翁治癖只用香蟾丸此家傳十三方也木香人參黃耆當歸桔梗三稜莪朮鱉甲緑礬枳實使君子楝根皮訶子乾蟾七錢五分黃連一兩上為末丸如緑豆大每服三四十丸米飲下腹痛有蟲有積蟲痛發作無時隨痛隨止發則面色㿠白口吐涎沫腹中痛作疙瘩脈洪大目直視似癇宜下之用木香檳榔丸苦楝根白皮煎湯送下先翁用雄黃解毒丸下之小兒體弱者不可下也用安蟲丸以漸去之莪朮醋煨木香黃連青皮檳榔使君子白蕪荑仁白雷丸苦楝根皮白者可用赤者有毒各等分上為末醋面丸麻子大白湯下家訓云凡欲取蟲須於每月上弦前取之蟲頭向上若望後頭向下不可取也王小亭子善食嘗苦蟲痛豫用安神丸服之三日後取下一蟲甚異約長一尺身赤色大如鱔令人手持其兩頭牽之長二三尺形如小線放下依舊短縮此蟲母也胡泮西弟蚤卒遺子乃泮西夫人養之嘗苦腹中蟲痛請先翁治之再三不效復請豫治之豫問先翁曾用何藥翁曰雄黃解毒丸豫問翁再有別方否翁曰只此一方用之屢效豫告翁云此蟲有靈當設法取之擇定除破日在每月初旬取之勿令兒知也隔夜煎下苦楝根湯次日五更與其伯母議用清油煎雞子餅一個先食之後服藥故不與食兒聞其香味急欲食之腹中如有物湧上心口取藥與服之少頃心口之物墜下以蛋食之不食也巳時腹中大鳴而瀉下一蟲甚異約小指長有頭有手足狀如嬰兒豫見之驚曰此云傳癆蟲也泮西云彼父癆死母亦癆死今此兒正三傳也幸去之矣令一婢用鐵鉗夾之河中以火焚之有煙撲入婢口中其婢亦病癆死此男無恙至今誦之翁曰汝用何藥如此神效余曰雄黃解毒丸恐人知之故祕之也本縣戶房吏閻姓者麻城人也子有蟲痛黃瘦腹中時痛口饞如有肉食則痛不發一日無肉則痛發也請先翁治之翁命豫往見其子甚弱不敢下乃思一計只用苦楝根皮放肉汁中煮食之單服三日下蟲如蝌蚪者一盆色黃黑後以養脾丸調理而安閻厚謝先翁謂先母曰吾有子矣往吾教他讀書醫出於儒先母聞之喜一兒七歲善食肉嘗病腹痛其父問曰積痛蟲痛何如豫曰積痛發有常處手不可按惡食而口乾蟲痛無常處喜手按摩口饞而吐清水此兒乃蟲痛也以藥取之下蟲大者十餘條而痛止未一月又痛豫曰不可再取矣如不去其蟲則痛不除積不除則蟲又生苟再取之恐傷胃氣不可也乃立一方用黃連木香檳榔去積為主陳皮青皮三稜莪朮枳實山楂專去其積使君子白蕪荑川楝子苦楝根皮專去其蟲等分為末神麯糊丸麻子大米飲下常服之時下小蟲及下大蟲如指大約長一尺乃蟲母也自後痛漸減或問人腹中皆有蛔蟲何兒之蟲獨多也豫曰小兒食傷成積積化為蟲嘗觀草腐而化螢木腐而生蠹人脾虛而蟲集其理一也或又問蟲之狀有不同者何也曰各從其臟變化也如心屬火化為羽蟲肝屬木化為毛蟲肺屬金化為介蟲腎屬水化為鱗蟲脾屬土化為倮蟲故蛔蟲倮蟲出於脾為土化也積痛小兒腹痛屬食積者多食積之痛屬寒者多蓋天地之化熱則發散而流通寒則翕聚而壅塞飲食下咽之後腸胃之陽不能行其變化轉輸之令使穀肉果菜之物留戀腸胃之中故隨其所在之處而作痛也如在胃中猶是完物在當心而痛宜吐之所謂高者越之也瓜蒂散主之其在小腸中雖變化猶是糟粕其痛在心之下臍之上宜辛溫之藥利下之宜丁香脾積丸主之一兒周歲食肉太早自此成積日漸羸瘦不思乳食其父沙溪告豫請醫治之豫取養脾去積丸先服三日後用脾積丸雞肉湯下取下雞肉一片猶未化也再服養脾丸調理而愈其在大腸者水穀已分傳送廣腸為疾也其痛在臍之上宜苦寒之藥下之木香檳榔丸主之如可吐者不如鹽湯探吐之法尤妙如飲食之後更有胃口痛者此宜吐之如因舊日之積作痛者不可吐之恐傷胃氣宜小陷胸丸主之枳實麩炒二錢半夏黃連薑汁炒各二錢草豆蔻炒五分上為末神麯糊丸麻子大薑湯下王小亭一日胃腕當心而痛請豫治之七日不止豫以手摸其胸腹問在何處惟心之下手不可近豫曰吾差矣何怪其藥之不效也凡腹痛手可按者虛痛也手不可按者實痛也實痛非積則痰故不可按也乃立一方於枳實導滯丸控涎丹二方內擇取枳實黃連半夏各二錢木香黑牽牛頭末白芥子炒甘草等分搗羅為末用生薑自然汁和神麯作丸麻子大以沉香木香檳榔磨水下或薑湯亦可初服二十一丸少頃痛移下中脘又服七丸至臍下又服五丸利下清水而止乃知是脾痛也復作枳朮丸加青皮陳皮木香砂仁神麯麥芽山楂調理而安治痛者其可忽諸凡腹中積痛者只在腸胃之中蓋腸胃為市物之聚也脾主腐化而無所受故也非客所犯必不為痛如有脾痛者宜祖傳三聖散主之蒼朮鹽炒香附子鹽炒良薑清油炒上為細末熱酒調下吐瀉吐出上焦瀉出下焦乃腸胃之病也脾在中焦管攝乎上下之間吐瀉互作者乃脾之病也夫人身之中足陽明胃脈之氣自上而下足太陰脾脈之氣自下而上上下循環陰陽交接謂之順而無病也故胃氣逆而為上則為嘔吐脾氣逆而為下則為泄瀉吐瀉之病脾胃為之總司也發揮云胃在上焦主內而不出嘔吐則不納矣腸在下焦主出而不入有積泄瀉出則無積矣觀李知先活人書括云胃家有熱難留食胃冷無緣納水漿則吐瀉之出於上焦也明矣又張長沙傷寒論云下利服理中不止理中者理中焦也治泄不利小便非其治也五苓散主之不止者在下焦赤石脂禹餘糧湯主之則泄瀉出於下焦也明矣赤石脂一斤禹餘糧一斤上水六升煮取二升去渣分三服又按治泄利者有四法焉有用理中湯以治其中氣者有用五苓散以利其小便者有用真武湯以溫其腎者有用赤石脂禹餘糧以固澀其大腸者不可不知其要也蓋腎開竅於二陰主蟄藏者也如門戶然泄瀉不止門戶不固也故用姜附以溫之閉其門戶也腸胃者容受水穀之氣猶倉廩然脾司出納乃倉廩之官也吐瀉不止乃倉廩之不藏官之失其職也故用參朮以補之封其倉廩也下焦者水穀注下之路如溝瀆然小便不利者溝瀆之不能別也故用豬苓澤瀉以利之疏通其水瀆也大便不禁溝瀆之不能瀦也故用赤石脂禹餘糧以澀之塞其決也真武湯茯苓芍藥生薑各一兩附子一枚炮破八片白朮二兩上用水八升煮取三升溫服七合日三祖訓治吐瀉者只用胃苓丸吐以煨生薑湯泄以一粒丹和之炒米湯下一粒丹亦名白玉丹此家傳十三方也寒水石煅二兩白礬枯一兩上為末水糊丸小豆大每一丸米湯下錢氏曰脾主困謂疲憊也非嗜臥也吐瀉久則生風飲食傷則成疳易至疲憊也此與腎主虛同論腎者元氣之主腎虛則為稟賦不足之病脾者穀氣之主脾虛則為津液不足之病故小兒五臟之病脾腎最多肝心次之肺又次之小兒吐瀉多因傷乳食得之如吐瀉時不啼哭不喜飲食此傷乳食也初得之不可遽止宿食未盡去也宜換乳食勿令重傷吐瀉益甚非醫之咎也益黃散主之有熱者胃苓丸用東向陳壁土和生薑少許炒焦入水煎湯澄清吞下瀉不止以胃苓丸一粒丹合而服之煎湯下效如吐瀉時不惡風寒喜人懷抱此傷風吐瀉也宜發散惺惺散如吐瀉時啼哭其身俯仰不安者必腹中有痛此藿亂也內傷乳食外感風寒得之先治其里宜理中湯加藿香後治其表桂枝湯表裡通治藿香正氣散一兒周歲吐瀉並作時天大寒醫用理中胃苓丸服之不效豫曰此表裡有寒邪未得發散也取益黃散與之其夜得大汗而止一女歲半與前兒同症吐瀉此傷食也前有外感風邪故用益黃散溫其表裡之寒此只是傷食用胃苓丸一粒丹陳壁土湯下調其脾胃消其食積而吐瀉俱止一兒暴吐瀉上下所出皆乳不化用理中丸服之效一兒暴吐瀉上下所出皆黃水中有乳片不化者用二陳湯加黃連薑汁炒煎服效或問二病同而治之異者何也曰所出之乳不化者胃有寒也故以理中丸急溫之所出乳片不化者胃有熱邪熱不殺穀宜半夏黃連以解之此同病異治法也嘔吐小兒嘔吐多因乳食之傷得之非若大人有寒有熱也然因於寒者亦有之嘔乳溢乳哯乳當分作三證治之嘔乳者初生小兒胃小而脆容乳不多為乳母者量飢而與之勿令其太飽可也子之胃小而脆母之乳多而急子縱飲之則胃不能容大嘔而出嘔有聲而乳多出如瓶注水滿而溢也溢乳者小兒初生筋骨弱左傾右側前俯後仰在人懷抱扶持之也乳後太飽兒身不正必溢出二三口也如瓶注水傾而出也哯乳者小兒無時乳常流出口角唇邊常見如瓶之漏而水滲出也即哺露嘔乳者節之可也溢乳者正抱其身可也皆不必治哯乳者胃病虛也宜補之理中湯丸加藿香木瓜主之先翁治小兒嘔吐只用胃苓丸研碎以生薑煨熱煎湯調下即止理中湯治嘔吐或有不止者嘔家不喜甘故也必去甘草加藿香之辛木瓜之酸用之效傷冷乳者所出清冷面㿠白者是也宜益黃散煨生薑煎湯調服傷熱乳者物出熱面赤唇燥者是也宜六一散煨生薑煎湯調服傷乳食物出作餿酸氣者是也宜胃苓丸煨生薑煎湯研碎調服本縣儒學教官陶有一子生八月病吐諸醫治之不止湯丸入口即吐諸醫云食入即吐是有火也欲作火治用瀉火藥又不效衆醫不能治其吐益劇即請豫至議治豫曰理中湯師曰服此方不得入也豫曰用法不同時有生員蔡一山素與吾不睦在傍笑云不必多言且看汝法何如也豫曰汝亦不必多言明早來問始見吾之能也此非試宏詞博學科何相忌耶作理中湯劑用獖豬膽汁童便各半拌之炒焦以水煎服藥入立止次早蔡生來問師曰果效問是何方曰理中湯蔡子又問何法豫曰此在傷寒論中豬膽人溺白通湯方下兄歸讀之自理會出來師又問豫曰吾聞蔡子常妒汝今信之請言其法豫曰吐本寒邪當用理中湯熱藥以止之內寒已甚格拒其陽故熱藥入喉被寒所拒不得入也今膽汁之苦寒童便之鹹寒下喉之後兩寒相得故不復出須臾之間陰氣漸消陽氣乃發此熱藥須冷服以主治格拒之寒以止嘔噦者是也宋理宗嘔吐不止召醫楊吉老治之問用何方曰辛熱藥也帝曰服之不效吉老奏曰熱藥冷服藥成放井中良久澄冷進服一啜而吐止即此法也師聞而喜之後以六君子湯作丸調之王少峰次子三個月病吐請醫治之藥乳不納豫見其兒在乳母懷中以身伸弩上竄厄厄作聲有發驚之意乃取理中湯丸末子一分用豬膽汁童便各半匙調分三服初一次少停略以乳喂一二口即止又進一次又乳之其兒睡一覺醒則嘔止不伸弩不厄厄作聲矣豫以是法教諸子止吐活人甚多乃良法也英山鄭孔韶一女辛丑三月患嘔吐請豫往視其證乃傷食吐乳也家人云無乃用理中湯去甘草加丁香藿香不效又作膽汁童便法亦不效四日後吐出飯半碗豫謂家人曰此女數日不食何以有此完飯也吾言傷食汝固曰無勞吾心力不得見效遂取脾積丸投之取下惡糞如靛詢之果五日前外翁王宅歸所吐出之飯即所食之飯也壅塞腸胃格拒飲食所以作吐下之即愈豫思小兒嘔噦不止多是肝膽二經之病故仲景豬膽人溺白通方在厥陰病中新制一方治嘔吐不止之病吳茱萸黃連各等分銼上用向東壁土一塊杵碎用藥放在銚中炒焦入水煎一二沸澄清服之凡治小兒嘔吐止後不可便與乳其吐復作非醫之咎也吐後多渴禁與湯水須使忍一時渴自止也若與湯水轉渴轉吐不可止也大人同有吐蛔者胃寒甚也宜理中丸用烏梅與椒煎湯調服神效寒水石煅飛二兩半夏泡七次七錢五分白枯礬五錢上為末水糊為丸麻子大薑湯下此家傳十三方也因於寒者食久則吐其乳不化宜理中湯加藿香砂仁主之因於熱者食入則吐其乳成片宜理中湯加黃連竹茹主之因於食積者吐出餿酸氣味惡食宜養脾消積丸甚者丁香脾積丸主之吐止後胃苓丸主之因於蟲者吐多清水腹痛多啼宜理中湯加木香檳榔丸主之嘔吐藥食不得入者此胃中有寒陰盛格陽也宜理中湯入童便豬膽汁主之一兒初生即吐醫欲用錢氏木瓜丸豫阻之曰不可小兒初生胃氣甚微初飲乳或有乳多過飽而吐者當令乳母緩緩與之或因浴時客寒犯胃而吐者當取其乳汁一杯用薑蔥同煎少與服之或因惡露涉水停在腹中而吐者宜以炙甘草煎湯而吐去之如何敢用木瓜丸以鐵粉檳榔之劑重犯其胃中初生中和之氣耶故常語人曰錢氏小兒方非先生親筆乃門人附會說也一兒自滿月後常吐乳父母憂之諸醫不能止一日問豫豫曰嘔吐者非常有之病也今常吐乳非病也然孩兒賴乳以生頻吐乳者非所宜也恐傷氣不可不求其故有母氣壯乳多者唯恐兒飢縱兒飽足飽則傷胃所食之乳湧而出此名嘔乳如瓶之注水滿而溢也宜損節之更服肥兒丸兒之初生筋骨軟弱為乳母者常懷抱護持可也不然則左右傾側其乳流出此名溢乳如瓶之側其水流出也能緊護持則不吐也有胃弱者不能受乳而變化之無時吐出所吐不多此名哺露如瓶之漏不能容受也當補其脾胃助其變化可也亦以肥兒丸主治泄瀉泄瀉有三寒熱積也寒瀉者不渴宜理中丸主之熱瀉者有渴宜五苓散合六一散主之積瀉者面黃所下酸臭食也宜丁香脾積丸下之積不去瀉不止也三稜煨莪朮煨良薑醋煮青皮去白醋煮各五分丁香去蒂三錢五分木香牙皂百草霜各三錢巴豆霜二錢五分上為末醋麵糊丸麻子大隨人加減胡三溪子病瀉不止三溪自與甘大用同醫皆吾所傳也不效其兄元溪云今有璞玉於此雖萬鎰必使玉人雕琢之今子病何不請密齊爾與甘子能治之乎時吾在英山此子原結拜我吾聞之即歸問其所用之方皆不對證觀其外候面色黃所下酸臭此積瀉宜下之積去瀉斯止矣乃取丁香脾積丸一服而安其父問云吾聞濕多成五瀉未聞所謂積瀉也豫曰難經有所謂大瘕瀉者是也濕成五瀉者有內因者有外因者有不內外因者如因於風者水穀不分謂之飧泄因於熱者水穀暴泄謂之洞泄因於寒者水穀不化謂之溏瀉因於濕者水穀稠黏謂之濡瀉此四瀉者外因之病濕自外生者也因於積者膿血交雜腸鳴腹痛所下腥臭謂之瘕瀉瘕者宿食積滯之名乃食症也此內因之病濕自內生者也有不內外因者乃誤下之病有挾熱挾寒之分所謂腸垢鶩溏者是也又問脾積丸乃取下之劑何以能止瀉也曰胃者水穀之海腸者水穀流行之道路也泄瀉者腸胃之病也腸胃無邪則水穀變化便溺流行是為無病兒矣今有宿食不化陳腐之物菀積於腸胃之中變為泄痢如源泉之水停積於中流出於外苟不溯其源而出之則泄痢終不止也故以脾積丸去其陳腐此拔本塞源之法按本草云巴豆未泄能令人泄已泄能令人止脾積丸之治積泄祖訓當遵守也余教諸子治泄瀉始終三法初用理中丸一服不止次用五苓散一二服分利不止三用白朮散服之良又不止用參苓白朮散調理未有不效再不止用參苓白朮散二分豆蔻一分發揮云難經五瀉之論甚詳豫論大腸瀉小腸瀉大瘕瀉則易明豫論脾瀉腎瀉則難分曉也且腑者府也謂水穀所藏之府有所受則有所出臟者藏也乃魂魄神志意所藏之舍無有所受豈有所出哉其脾瀉者即胃瀉也謂脾不能約束其胃胃不能藏而瀉也故瀉有屬脾者有屬腎者但自胃來者水穀注下而多自脾來者則成黃糜瀉無度而少也觀仲景傷寒論中大便不通者用脾約丸其意明矣腎亦臟也謂之腎瀉者腎開竅於二陰為閉藏之主腎虛則不能主閉藏而水穀自下且下焦如瀆有所受則有所出也但瀉不同難經云其瀉下重者即腎瀉也觀東垣先生脾胃論補中益氣湯方凡大便弩責者加當歸身紅花弩責者即下重當歸紅花以潤血蓋腎惡燥故用二物以潤之腎瀉亦與大瘕瀉同瀉者痢也乃積滯之物故痢曰滯下況痢則腹痛有腸鳴有裡急有赤白若腎瀉則便時略難卻無裡急後重之證故云痢則下重也古人立方治腎瀉有用破故紙者補其腎也有用吳茱萸者補其肝也皆苦以堅之辛以潤之之法今吾立方治脾瀉者只用參苓白朮丸治腎瀉者只用六味地黃丸加破故紙甚效胃瀉大腸泄小腸泄三者不同蓋自胃來者水穀注下而不分所下者皆完穀也此寒治宜理中丸主之自小腸來者亦水穀注下而不分則成糟粕而非完穀且小腸為受氣之府水穀到此已變化而未盡變化也治宜分別水穀以五苓散主之使水穀分利則瀉止矣自大腸來者則變化盡而成屎但不結聚而所下皆酸臭也宜用傷寒論中禹餘糧湯陳文中痘疹方中肉豆蔻丸主之此澀可以去滑之法也叔和云濕多五瀉此本內經濕勝則濡瀉之論所謂五瀉則與難經之論不同素問以臟腑分五瀉叔和以風寒濕熱食分五瀉如泄時有發熱惡寒水穀不分者此風濕證也謂飧泄經云春傷於風夏生飧泄者是也宜小建中湯加防風主之若兼膿血者胃風湯主之如瀉時有腹痛或吐或不吐所瀉者多完穀未化此寒濕證也宜理中湯主之如瀉時有腹痛或痛或不痛所下亦有完穀而未盡化者此邪熱不殺穀也有成糟粕者皆屬熱濕以傷寒論中豬苓湯主之寒濕熱濕宜詳辨之屬寒者不渴屬熱者渴也如瀉時水穀混下小便少而大便多者此濕瀉也有溏瀉無度者此久濕也並宜五苓散主之如瀉時有腹痛腹鳴之證惡食所下酸臭之物此因宿食停滯於中而成濕此食化為濕也宜下之積去泄自止也丁香脾積丸主之泄瀉二字亦當辨之泄者謂水穀之物泄出也瀉者謂腸胃之氣下陷也豬苓湯豬苓澤瀉阿膠滑石茯苓各一錢水煎春月得之名傷風其證發熱而渴小便短少宜先清熱後補脾清熱薷苓湯補脾白朮散夏至後得之瀉者有寒有熱渴欲飲水者熱瀉也先服玉露散以清暑止渴後服白朮散以補脾如不渴者寒瀉也先服理中丸以溫中補脾後服五苓散以清暑此祖傳之妙也夏月水瀉其詳在因五邪之氣所生病條內有案秋月得之傷濕瀉也其證體重所下溏糞謂之濡瀉宜滲濕補脾利小便胃苓湯主之或升麻除濕湯冬月得之傷寒瀉也其證腹痛所下清水宜溫理中丸或理中湯加熟附子少許主之不止宜豆蔻丸四時之中有積瀉者面黃善腫腹中時痛所下酸臭者是也宜先去積後調脾胃去積丁香脾積丸調理脾胃胃苓丸治瀉大法不問寒熱先服理中丸理中者理中氣也治泄不利小便非其治也五苓散主之更不止胃氣下陷也補中益氣湯清氣上升則不瀉矣又不止者此滑瀉也宜澀之豆蔻丸主之此祖傅之祕法也小兒泄瀉依法治之不效者脾胃已衰不能轉運藥性以施變化只以補脾為主脾胃既健藥自效也白朮散主之常與無間此豫先父之祕授也久瀉不止津液消耗脾胃倒敗下之谷亡必成慢驚所謂脾虛則吐瀉生風者是也故應補脾胃於將衰之先宜用白朮散補之補之不效宜用調元湯加建中湯急救否則慢風已成雖使仲陽復生不可為也詳見慢驚內小兒泄瀉大渴不止者勿與湯水飲之水入則愈加渴而病益甚宜生脾胃之津液白朮散主之久瀉不止發熱者此津液不足乃虛熱也勿投以涼藥反耗津液宜白朮散主之如熱更甚黃連丸主之白朮散治小兒泄瀉煩渴者四君子加木香藿香各等分葛根加一倍上作大劑水煎常服以代湯水黃連丸治久瀉發熱此虛熱也黃連乾蟾炙各二錢木香一錢使君子一錢蘆薈夜明砂各七分上為末山藥研粉水糊丸麻子大米水下升麻除濕湯治風濕作瀉自下而上者引而竭之如脾胃甚弱不思飲食腸鳴腹痛泄瀉無度小便赤澀四肢困倦升麻柴胡防風神麯澤瀉豬苓各五分蒼朮一錢陳皮甘草炙麥糵各三分為末水煎熱服玉露散治傷熱瀉黃方見前與五苓散合勻名桂苓甘露飲治熱瀉此豫心得之妙一兒有病一日夜三五行或瀉或止連年不愈此脾瀉也胃苓丸加人參主之一兒無病時值盛夏醫以天水散與之謂其能解暑毒也服後暴瀉醫悔用作理中湯連進三劑瀉變痢疾日夜無度膿血相雜兒益困頓皮燥無汗發聚成穗請豫治之豫曰挾熱而痢者其腸必垢瀉久不止則成疳瀉此兒初瀉本時行之病非干天水散也醫當用天水散調五苓散服之可也反以理中湯熱劑投之遂成挾熱腸垢之病皮燥發穗者表有熱甚也下痢窘迫者里有熱甚也表裡俱熱津液亦衰事急矣因制一方用黃連乾蟾炙各一錢木香青皮白茯苓當歸身訶子肉各一錢五分共為末粟米粉作糊為丸每服三十丸炒陳米湯下十日後滿頭出小癤身上發痱如粟熱平痢止而愈噫此子非吾無生矣一兒病瀉大渴不止醫以五苓散玉露散皆不效病益困腮妍唇紅豫見之曰不可治也泄瀉大渴者水去谷少津液不足故也法當用白朮散補其津液可也乃服五苓散玉露散滲利之劑重亡津液脾胃轉虛訣云大渴不止止而又渴者死泄瀉不止精神好者死父母不信三日後發搐而死壬子經魁萬賓蘭石泉翁之伯子也翁得子晚始生賓蘭愛如珠玉周歲得水瀉一日夜十餘行翁善醫自作理中湯加訶子肉豆蔻與之不效乃急請豫至敘其用藥不效豫曰正理論云理中者理中氣也治泄不利小便非其治也遂用五苓散去桂加甘草一服瀉止三日後遍身發出赤斑石泉懼豫曰無妨活人書云傷寒病下之太早熱氣乘虛入胃發斑今夏月熱盛之時瀉久裡虛熱氣乘虛而入且多服理中辛甘之劑熱留胃中今發赤斑熱自里而出於表也宜作化斑湯必易愈翁曰石膏性寒非瀉所宜曰有是病則投是藥在夏月白虎猶宜用也一服而斑沒熱退本縣大尹朱云閣公子病泄十日不止衆醫或用理中五苓益元白朮散等皆不效瀉渴益甚公亟召余至視其外侯啓曰渴太甚當先止渴公曰當先止瀉余曰病本濕熱水穀不分更飲水多則濕傷脾胃水積腸胃所瀉之水乃所飲之水也故當先止其渴渴止瀉亦止矣公曰當用何方曰白朮散尹曰已服過多余曰用之不同也尹曰用之更有別法乎余曰本方在常與服之此常字便是法也蓋白朮散乃治瀉作渴之神方此方有二法人參白朮茯苓甘草藿香木香六味各一錢葛根倍二錢者泄瀉久不止胃中津液下陷也故葛根倍用之以升胃中之津液此一法也今人不知倍用之法與六味等分同故效少也兒病渴者湯水不離今人不知常服之法以藥常代湯飲之也故所用之方雖是所用之法不同藥劑少而湯水猶多藥少湯多猶以一杯之水救一車薪之火水不勝火如何有效當作大劑煎湯以代湯水飲之渴只飲本方一切湯水禁之勿與則胃氣上升津液自生渴瀉止矣尹聞而是之果一劑治矣不問泄瀉痢疾並宜服此多多益善不唯泄瀉可止亦不至脾虛生風也真神妙方也謹詳述之公子脾胃素弱常傷食一醫枳朮丸保和丸其意常用枳朮丸補脾至傷食則服保和丸不效公以問豫豫曰此法固好但專用枳朮丸則無消導之藥初不能制其飲食之傷專服保和丸則脾胃之虛不能勝其消導而反損中和之氣當立一方七分補養三分消導則脾胃自強不能再傷矣公曰甚善汝作一方來看余乃制用人參白朮青皮陳皮甘草木香縮砂仁山藥蓮肉使君子神麯麥芽為末荷葉煨飯搗爛為丸米飲送下名之曰養脾消食肥兒丸服後精采頓異飲食無傷公益喜録其方常久用之親書儒醫二字作匾賜之庠生胡逸泉東郊翁之伯子也周歲時得水泄先請醫甘大用治之不效復請豫至視之則肌肉消削面色㿠白時盛夏凝汗不潤皮膚乾燥發豎所下頻並略帶後重此氣血俱虛也按治法之補中氣利小便升舉其陽固澀其滑次第調之略無寸效或曰何如豫曰術將窮矣唯有一法未用耳乃作疳瀉治之用人參白朮白茯苓甘草陳皮山藥當歸蓮肉砂仁訶子肉豆蔻黃連木香乾蟾為末神麯糊丸煎四君子湯下服未二日膚潤有微汗再一日頭上見出紅瘡小便漸多五日而瀉止後更以參苓白朮散作丸服之調理而安汪望峰長子城南生一子寄姊夫南河胡家養南河嘗語人曰萬老先生好小兒科今子全作聰明兒有病可請張祖兄醫之乃先生親傳豫亦與人會藥不執方合宜而用吾之活人多矣試舉其一二驗者實之城南一子病瀉十餘日不止一向是張用藥以胃苓丸一粒丹服之皆無效請豫治之望峰知其故恐豫不肯用心取白金二兩作利市豫嘆曰不在利市只在信我也我之治病敢作聰明皆先人之舊方顧用之不同耳蓋治大病以重劑治小病以輕劑彼胃苓丸一粒丹豈治此重病哉乃取豆蔻丸五十胃苓丸五十陳倉米煎湯下語南河云只此一劑而止不再下也南河初不聽泄止大悟曰良工不示人以朴信乎湖廣右布政孫小姐五月病瀉至七月猶未止諸醫治之皆不效差人召余余至見其大渴乃知津液不足也不止其渴瀉亦不止熱亦不除也公問余曰數日可安曰三日止渴五日止瀉十日熱退計十八日可安公曰病久矣一月而安幸也乃進白朮散作大劑以代湯須臾飲盡豫見其渴甚再加制過天花粉二劑其夜渴止瀉亦微止次日又進一劑渴瀉俱止三日熱亦漸退四日公又問余曰小姐病未安奈何余告曰初來時曾許三日止渴五日止瀉十日退熱今日來五日渴瀉俱止熱亦漸退耕當問農織當問女小姐貴體余以身任之唯足下寬量數日可也公稱謝再用白朮散減乾葛加陳皮調治半月而效公大喜給札付冠帶儒醫匾白金一十兩此萬曆元年九月初四日也本縣大尹唐百峰行之痢疾痢不問赤白皆從積治濕熱者食積之所生也痢初得之其法宜下積不去痢不止也如吐泄後痢者其積已下不可再下復傷胃氣可下者木香導滯丸主之不可下宜去積保和丸主之陳皮五錢枳殼炒三錢黃連薑汁炒五錢神麯山楂肉麥糵各三錢萊服子炒三錢檳榔三錢上為末水糊丸麻子大白湯下木香導滯丸枳實炒厚朴薑汁炒檳榔各五錢黃連黃芩黃柏大黃各七錢半木香二錢五分黑牽牛半生半炒取頭末二錢半上為末酒糊丸小豆大白湯下祖訓只用香連丸黃連一兩淨銼用吳茱萸半兩水拌濕同炒去萸不用木香五錢石蓮肉一錢上為末酒糊丸麻子大陳倉米煎湯下此家傳十三方也豫教諸子治痢只用保和丸香連丸同服萬無一失鄖陽撫臺都御史孫小姐自五月病痢至七月未愈差荊襄承差取鄖陽醫官治之不效遣承差王加宜取豫豫往病亟矣用人參白茯苓甘草當歸白芍黃苓車前子陳皮各等分炒乾姜少許煎服略差五日大安公晚飲間問豫云諸醫皆用木香黃連今汝不用所用皆非治痢之藥而效者何也余曰此乃河間黃芩芍藥湯方也所謂調其氣則後重除養其血而痢止之法也臺云小女前年在湖廣病泄今年在此病痢皆五六月間幸遇汝之良醫而安然小女之遇汝爾之遇我非偶然余叩首謝本縣祝道士長子七歲病痢半年不愈求豫治之豫與一方用人參白朮茯苓甘草陳皮山藥黃耆桔梗木香黃連訶子肉豆蔻車前子乾薑炒澤瀉神麯當歸麥芽白芍為末水面丸米飲下一月安名和中丸一女十歲患痢久不止脈洪數或曰下痢脈宜小今脈洪數恐難治豫曰無妨玉函經曰欲識童男並童女決在寸關並尺裡自然緊數甚分明都緣未散精華氣此童女脈宜如是胃氣當強不久自愈果數日痢漸止本縣張大尹有公子半歲病赤白痢甚苦用黃連一錢木香五分石蓮肉五分陳皮七分乾薑炒二分為末神麯丸黍米大陳米飲下痢疾渴者七味白朮散去乾葛加炒乾薑黃連阿膠烏梅主之痢苦噤口者宜參苓白朮散加石菖蒲為末陳倉米湯下痢疾脫肛者只止其痢痢止肛自不下矣瀉後變痢後重者胃氣之下陷也赤白者腸垢之下溜也水穀盡而腸胃敗故死痢後變瀉後重止者濕熱之氣去也赤白止者陳腐之物盡也腸胃通而水穀行故生也凡下痢鮮血者黑如屋漏水者氣促者大孔如竹筒者嘔噦不食者足趺腫者身熱脈大者渴欲飲水者只大渴者面嬌面青者皆死證也初病痢者腹中急痛大便窘迫小便赤澀身熱飲水宜急下之輕者三黃枳朮丸重者木香檳榔丸去其陳垢其痢自止此時邪氣未動正氣未傷故宜下之若喜補惡攻使邪氣日強正氣日弱不下之則積熱不除下之則脾胃俱弱釀成大病醫之過也初病泄瀉漸變痢者此時宿垢已去不可再下如有腹痛裡急後重之證乃未盡之餘邪也宜去積止痢去積保和去滯丸止痢香連丸痢久不止者名休息痢家傳和中丸或問赤痢為熱白痢為寒何如曰原病式論之詳矣痢下赤白皆濕熱也赤者自小腸來小腸者心之腑心屬火故其色赤白者自大腸來大腸者肺之腑也肺屬金故其色白赤者屬熱白者屬濕濕亦熱也經云濕盛而熱也若初痢下鮮血者非赤也此風熱之毒宜剪紅丸主之如痢下瘀血或如豆汁者此濕氣下血也宜胃風湯主之或問河間云行氣則後重除養血則痢止此千古不易之法也今幼科治痢之方不用其法何也曰痢者素云腸澼難云大瘕泄古云滯下腸澼者因於飽食也大瘕泄者食症也滯下者積滯之物下出也故云無積不成痢治法以攻積為先務也積不去則氣不行去積所以行其氣而不裡急後重也熱則傷血痢久則傷血去熱止泄所以養其血也法雖不同意則合也或問丹溪云先瀉後變痢者脾傳腎也難治先痢後變瀉者腎傳脾也易治何以言之曰脾主濕濕勝則濡瀉瀉者脾之病也瀉久不止又變成痢痢下後重腎病也如痢非真痢也故後重者胃氣之下陷也膿血者腸垢之下溜也真氣敗而穀氣絶是謂難治腎惡濕小兒久坐濕地則傷腎裡急後重便膿血者腎之病也痢久不止忽變成瀉濕去而脾病在也故里不急痛者濕熱之毒除也便無膿血者陳莝之穢盡也腸胃通而水穀行故易治或問痢疾身涼脈靜者生身熱脈躁者死其然乎曰初病時邪氣方盛身熱脈躁者多不可呼為死證也邪氣盛則實可急下之邪去脈自衰身自涼也痢久而身熱脈躁則不可治也脈靜身涼久痢之後真氣已虛之脈也身宜溫不可太涼脈宜靜不可太弱經云瀉痢五虛者死脈細一也皮寒二也少氣三也泄痢不止四也飲食不入五也此脈靜身涼之言不可執著也痢久不能食或有食入即吐者名噤口痢即經所謂五虛者死古方雖多無甚效者大抵瀉痢日久津液已竭脾胃虛弱不能食也宜以補脾為主白朮散去乾葛加炒乾姜主之能食者生矣不能食者死痢久脫肛者氣血虛也素云下陷者虛也難云出者為虛古方多用澀劑如蝟皮木賊之類此治其標也當用河間行氣養血之法痢止後重除肛腸自不脫出矣加減八珍丸主之有痢下赤白青黑者名野雞痢用阿膠梅連丸主之有痢兩膝腫大者名曰鶴膝風加味地黃丸主之保和去滯丸治痢疾有積胃弱不可重下陳皮五錢半夏曲白茯苓枳實麩炒厚朴薑汁炒檳榔各五錢萊蔔子炒二錢半木香上為末神麯糊丸麻子大陳米湯下三黃枳朴丸治濕熱成痢並有食積者黃連黃芩黃柏皆酒炒各三錢大黃酒煨五錢枳實麩炒厚朴薑汁炒檳榔各二錢上為末酒糊丸麻子大薑湯下胃風湯八珍湯去地黃甘草加桂等分入粟米同煎本方去桂加連等分吳茱萸減半同炒為末酒糊丸可治遠近血痢阿膠梅連丸治痢無分久新赤白青黑疼痛證阿膠草灰炒成珠赤茯苓烏梅去核炒赤芍黃柏炒黃連炒乾薑炒當歸各等分上為末入阿膠和勻水丸麻子大陳米飲下家傳和中丸專治休息痢人參甘草當歸身川芎車前子略炒豬苓澤瀉神麯黃連炒各三錢麥糵面訶子石蓮子乾薑炮肉豆蔻麵煨木香各三錢白茯苓白朮白芍陳皮三錢上為末酒糊丸麻子大陳米飲下加味地黃丸治痢後鶴膝風地黃丸加牛膝虎脛骨酥炙白茯苓共為末蜜丸服加味八珍丸治久痢脫肛八珍湯去川芎白朮加黃連炒阿膠上炒各三分木香三分之二減半上共為末水丸麻子大炒米湯下多服佳剪紅丸治痢血神效當歸身黃連炒槐角子炒側柏葉炒荊芥穗枳殼炒各等分上為末酒煮麵糊丸麻子大陳米湯下
