front:
  text: 序造化大慈也有所授之於焉有晰於其微而身皆傳之者是帝之力臣而軒岐氏嗣響也慈父母塗阱陷設夏威顧乃於意實嗜好而犢之有形無形之別也無形而汨天和即慈父母之懷猶然災疹之區矧乎寒熱燥濕之微茫而又以的為招乎或者謂彭殤有主方書之奇也鮓龍之代甘脆也則參朮芎芩當不與山青並爛其半為造物所蠹者天與人不並至也而不見夫蓬蓬者乎塞向有方指而勝之䠓而勝之南北海而蹢躅猶有及也而不見乎豫章之木乎鄧林之腴青陽之德然必七年而後可覺方芽而斫削是尋其盡也斯須柰何養赤子者愛於一指一䠓斧斫而還自賊也其忽錙銖其讎什伯蚤覺者反是操寸帙而攻萬瘥代冥冥力故耳目遞貴於方輿之內所謂朝宓軒而參元宰者萬氏於此道至焉哉廣嗣者弓襡皇皇焉而幾得之已痘者昣治皇皇焉而幾得之其危而不可必者屢屢也斯書成人之命所必欲得者無不得之於萬氏則非鮓龍之詭而甘脆之可遞嘗也手授其徒命曰家秘不佞奄有赤子之邦不以廣而傳之是蔽造化之大慈而不能得之於萬氏者無以得之於天矣不佞又不以歸萬氏而歸之冥冥有神授之者也庶幾附於如保之意
