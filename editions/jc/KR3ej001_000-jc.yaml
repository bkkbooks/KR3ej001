body:
  text: 敘萬氏幼科源流粵自先祖杏城翁豫章人以幼科鳴第一世蚤卒先考菊軒翁孤繼其志而述之成化庚子客於羅娶先妣陳氏生不肖乃家焉其術大行遠近聞而誦之萬氏小兒科云為貳世羅有鉅儒張玉泉胡柳溪講明律歷史綱之學翁知全可教命從遊於夫子之門而學焉頗得其傳翁卒矣顧其幼科之不明不行也前無作者雖美弗彰後無述者雖盛弗傳不肖之責也故予暇日自求家世相傳之緒散失者集之缺略者補之繁蕪者刪之錯誤者訂之書成名育嬰家秘以遺子孫為三世惜乎有子十人未有能而行之者其書已流傳於荊襄閩洛吳越之間莫不曰此萬氏家傳小兒科也餘切念之治病者法也主治者意也擇法而不精徒法也語意而不詳徒意也法愈煩而意無補於世不如無書又著幼科發揮以明之者發明育嬰家秘之遺意也吾不明後世君子必有明之者不與諸子恐其不能明不能行萬氏之澤未及肆世而斬矣與門人者苟能如尹公他得庾公之斯而教之則授受得人夫子之道不墜若陳相雖周孔之道亦失其傳也諸賢勖之哉
